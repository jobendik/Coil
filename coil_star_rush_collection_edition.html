<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>COIL · Star Rush Collection Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;800;900&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<!-- CrazyGames v3 SDK: active on CrazyGames domains, harmless no-op (or fails silently) elsewhere -->
<script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
<style>
  :root{ --safe-top: env(safe-area-inset-top, 0px); }
  #sat{ position:fixed; top:0; left:0; width:0; height:env(safe-area-inset-top, 0px); pointer-events:none; visibility:hidden; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
  html,body{height:100%;background:#04030a;overflow:hidden;overscroll-behavior:none;font-family:'Sora',sans-serif;color:#eaf6ff;position:fixed;inset:0;width:100%;}
  body{display:flex;align-items:center;justify-content:center;touch-action:none;}
  #frame{position:relative;width:100%;max-width:540px;height:100%;height:100dvh;overflow:hidden;
    background:radial-gradient(130% 90% at 50% 0%, #1c1140 0%, #0a0720 45%, #04030a 100%);
    box-shadow:0 0 0 1px #1a1535, 0 30px 90px rgba(0,0,0,.6);}
  canvas{display:block;width:100%;height:100%;touch-action:none;}
  /* animated neon edge — pure CSS, sits above canvas, party glow that breathes harder */
  #frame::before{content:"";position:absolute;inset:0;pointer-events:none;z-index:8;border-radius:0;
    box-shadow:inset 0 0 70px rgba(47,243,224,.14), inset 0 0 150px rgba(255,77,141,.08);
    animation:edge 5s ease-in-out infinite;}
  @keyframes edge{
    0%,100%{box-shadow:inset 0 0 70px rgba(47,243,224,.16), inset 0 0 160px rgba(255,77,141,.07);}
    33%{box-shadow:inset 0 0 90px rgba(255,210,74,.15), inset 0 0 180px rgba(167,107,255,.10);}
    66%{box-shadow:inset 0 0 80px rgba(255,77,141,.14), inset 0 0 170px rgba(47,243,224,.10);}}
  /* vignette + a soft top screen-sheen, like light catching a glass cabinet */
  #frame::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:9;
    background:
      radial-gradient(120% 70% at 50% -10%, rgba(255,255,255,.05) 0%, rgba(255,255,255,0) 40%),
      radial-gradient(120% 100% at 50% 50%, rgba(0,0,0,0) 56%, rgba(0,0,0,.55) 100%);}
</style>
</head>
<body>
<div id="sat"></div>
<div id="frame"><canvas id="cv"></canvas></div>
<script>
"use strict";
/* =========================================================================
   COIL · STAR RUSH — one-thumb orbital climber, cosmic arcade
   Core loop: loop nodes to charge · release in the glow · climb away from the void.
   The reward layer (Vault, Starfall, Frenzy, achievements) sits on top of the
   skill loop without altering its physics.
   ========================================================================= */
const DEBUG=false;
let SAFE_TOP = 8;

/* ---------- safe storage ---------- */
const _mem={};
const Store={
  get(k,d){try{const v=localStorage.getItem(k);return v==null?d:JSON.parse(v);}catch(e){return (k in _mem)?_mem[k]:d;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){_mem[k]=v;}}
};

/* =========================================================================
   CrazyGames SDK v3 — graceful integration.
   Drives the platform KPIs (gameplay conversion, session length) and unlocks
   ad revenue. Everything is wrapped so the file still runs perfectly as a
   standalone HTML (no SDK present → ads grant their reward locally, events
   become no-ops). The sacred core physics never depends on any of this.
   ========================================================================= */
const CGSDK={
  sdk:null, ready:false, adPlaying:false, active:false,
  init(){
    try{
      if(window.CrazyGames && window.CrazyGames.SDK){
        this.sdk=window.CrazyGames.SDK;
        try{ this.sdk.game.loadingStart(); }catch(e){}
        this.sdk.init().then(()=>{ this.ready=true; try{ this.sdk.game.loadingStop(); }catch(e){} })
                       .catch(()=>{ this.ready=false; this.sdk=null; });
      }
    }catch(e){ this.sdk=null; }
  },
  gameplayStart(){ if(this.active) return; this.active=true; try{ this.sdk&&this.sdk.game.gameplayStart(); }catch(e){} },
  gameplayStop(){ if(!this.active) return; this.active=false; try{ this.sdk&&this.sdk.game.gameplayStop(); }catch(e){} },
  happytime(){ try{ this.sdk&&this.sdk.game.happytime(); }catch(e){} },
  _adWrap(start,done){ this.adPlaying=true; paused=true;
    try{ if(AC && AC.suspend) AC.suspend(); }catch(e){}
    start&&start(); },
  _adEnd(){ this.adPlaying=false; paused=false; last=performance.now(); acc=0;
    try{ if(AC && AC.resume) AC.resume(); }catch(e){} },
  /* rewarded video — onReward only fires on a genuine completed view (or standalone). */
  rewarded(onReward,onSkip){
    if(!this.sdk){ onReward&&onReward(); return; }              // standalone: grant directly
    let settled=false; const finish=(ok)=>{ if(settled)return; settled=true; this._adEnd(); ok?onReward&&onReward():onSkip&&onSkip(); };
    this._adWrap();
    try{ this.sdk.ad.requestAd('rewarded',{ adStarted:()=>{}, adFinished:()=>finish(true), adError:()=>finish(false) }); }
    catch(e){ finish(false); }
  },
  /* midgame interstitial — between runs only; platform also frequency-caps. */
  midgame(done){
    if(!this.sdk){ done&&done(); return; }
    let settled=false; const finish=()=>{ if(settled)return; settled=true; this._adEnd(); done&&done(); };
    this._adWrap();
    try{ this.sdk.ad.requestAd('midgame',{ adStarted:()=>{}, adFinished:finish, adError:finish }); }
    catch(e){ finish(); }
  }
};

/* ---------- canvas ---------- */
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  const r=cv.getBoundingClientRect(); W=Math.round(r.width)||360; H=Math.round(r.height)||640;
  cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  let inset=0; const sat=document.getElementById('sat'); if(sat){ inset=sat.getBoundingClientRect().height||0; }
  SAFE_TOP = Math.round(inset) + 6;
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,80));

/* ---------- audio ---------- */
let AC=null, muted=Store.get('coil_muted',false), musicMuted=Store.get('coil_music_muted',false);
function ac(){ if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}} if(AC&&AC.state==='suspended'){try{AC.resume();}catch(e){}} return AC; }
function musicTone(f,d=.12,type='sine',vol=.055,slide=0){
  if(musicMuted||CGSDK.adPlaying) return; const a=ac(); if(!a) return; const t=a.currentTime;
  const o=a.createOscillator(),g=a.createGain(); o.type=type; o.frequency.setValueAtTime(f,t);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(40,f+slide),t+d);
  g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.0001,t+d);
  o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+d+.03);
}
function tone(f,d=.08,type='sine',vol=.16,slide=0){
  if(muted||CGSDK.adPlaying) return; const a=ac(); if(!a) return; const t=a.currentTime;
  const o=a.createOscillator(),g=a.createGain(); o.type=type; o.frequency.setValueAtTime(f,t);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(40,f+slide),t+d);
  g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.0001,t+d);
  o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+d+.02);
}
function noise(d=.18,vol=.22,lp=1600){
  if(muted||CGSDK.adPlaying) return; const a=ac(); if(!a) return; const n=Math.floor(a.sampleRate*d);
  const b=a.createBuffer(1,n,a.sampleRate),dd=b.getChannelData(0);
  for(let i=0;i<n;i++) dd[i]=(Math.random()*2-1)*(1-i/n);
  const s=a.createBufferSource(); s.buffer=b; const g=a.createGain(); g.gain.value=vol;
  const f=a.createBiquadFilter(); f.type='lowpass'; f.frequency.value=lp;
  s.connect(f); f.connect(g); g.connect(a.destination); s.start();
}
/* a swelling band-passed noise — "crowd cheer / applause" texture for big wins */
function cheerSwell(d=.55,vol=.16){
  if(muted||CGSDK.adPlaying) return; const a=ac(); if(!a) return; const n=Math.floor(a.sampleRate*d);
  const b=a.createBuffer(1,n,a.sampleRate),dd=b.getChannelData(0);
  for(let i=0;i<n;i++) dd[i]=(Math.random()*2-1);
  const s=a.createBufferSource(); s.buffer=b; const g=a.createGain();
  const f=a.createBiquadFilter(); f.type='bandpass'; f.frequency.value=2400; f.Q.value=0.6;
  const t=a.currentTime; g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+d*0.45); g.gain.exponentialRampToValueAtTime(.0001,t+d);
  s.connect(f); f.connect(g); g.connect(a.destination); s.start();
}
const SFX_LAST={};
function canPlaySfx(name,ms){ const t=performance.now(); if(SFX_LAST[name]&&t-SFX_LAST[name]<ms) return false; SFX_LAST[name]=t; return true; }
const SFX={
  catch(c){ if(!canPlaySfx('catch',45))return; tone(420+Math.min(c,12)*55,.09,'triangle',.15,120); },
  whoosh(ch){ if(!canPlaySfx('whoosh',50))return; noise(.16,.10+ch*.10,900+ch*1400); tone(180+ch*260,.12,'sawtooth',.09,-120); },
  /* perfect CLIMBS with multiplier — a bright ascending arpeggio + sparkle top */
  perfect(m){ if(!canPlaySfx('perfect',50))return; m=Math.min(m,9);
    const base=540+m*70; const steps=[1,1.26,1.5,1.88,2.25,2.66];
    const n=Math.min(steps.length, 2+Math.floor(m/1.8));
    for(let i=0;i<n;i++) setTimeout(()=>tone(base*steps[i], .085, i%2?'square':'triangle', .17-i*0.012, 70), i*40);
    // sparkle shimmer on top — denser the higher the chain
    for(let i=0;i<Math.ceil(m/2);i++) setTimeout(()=>tone(1900+Math.random()*1200,.06,'triangle',.06), n*40+i*20);
  },
  coin(){ if(!canPlaySfx('coin',35))return; tone(980,.05,'square',.10,240); setTimeout(()=>tone(1480,.06,'triangle',.08),40); },
  /* descending/ascending bling shower — n coins tumbling into the tray */
  coinCascade(n=6){ if(muted)return; n=Math.min(n,12); for(let i=0;i<n;i++) setTimeout(()=>tone(720+i*85,.05,'square',.07,140),i*32); },
  /* cash register ka-ching */
  chaching(){ if(!canPlaySfx('chaching',60))return; tone(880,.05,'square',.12,300); setTimeout(()=>tone(1320,.07,'square',.12,180),55); setTimeout(()=>tone(1860,.13,'triangle',.13),115); },
  bonus(){ [784,988,1318].forEach((f,i)=>setTimeout(()=>tone(f,.12,'triangle',.16),i*55)); },
  /* full fanfare for milestones / new best */
  jackpot(){ [523,659,784,1046,1318,1568,2093].forEach((f,i)=>setTimeout(()=>tone(f,.14,'triangle',.16),i*52)); setTimeout(()=>cheerSwell(.6,.16),120); },
  shield(){ tone(300,.2,'sine',.16,500); },
  death(){ noise(.35,.3,1200); tone(120,.35,'sawtooth',.22,-70); },
  unlock(){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,.14,'triangle',.16),i*80)); },
  milestone(){ [659,880,1175].forEach((f,i)=>setTimeout(()=>tone(f,.16,'triangle',.17),i*65)); },
  click(){ tone(520,.05,'square',.1,90); },
  tick(){ if(!canPlaySfx('tick',24))return; tone(1500,.03,'square',.05,80); },
  /* short bright "plink" when a flying coin lands in the bank */
  deposit(){ if(!canPlaySfx('deposit',22))return; tone(1240,.04,'square',.08,300); setTimeout(()=>tone(1860,.05,'triangle',.05),28); },
  /* ascending anticipation riser — used just before a payout reveal */
  riser(dur){ dur=dur||0.7; if(muted)return; const a=ac(); if(!a)return; const t=a.currentTime;
    const o=a.createOscillator(),g=a.createGain(),f=a.createBiquadFilter(); o.type='sawtooth';
    o.frequency.setValueAtTime(280,t); o.frequency.exponentialRampToValueAtTime(1600,t+dur);
    f.type='bandpass'; f.frequency.setValueAtTime(420,t); f.frequency.exponentialRampToValueAtTime(2400,t+dur); f.Q.value=1.1;
    g.gain.setValueAtTime(.0001,t); g.gain.exponentialRampToValueAtTime(.11,t+dur*0.82); g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.connect(f); f.connect(g); g.connect(a.destination); o.start(t); o.stop(t+dur+0.05); }
};

/* ---------- FRENZY melodic layer: a looping major arpeggio, stepped by Beat (no drift) ---------- */
const FrenzyMusic={ step:0, notes:[523,659,784,988,784,659], 
  pluck(){ if(musicMuted) return; const a=ac(); if(!a) return; const f=this.notes[this.step%this.notes.length]; this.step++;
    const t=a.currentTime; const o=a.createOscillator(),g=a.createGain(); o.type='triangle';
    o.frequency.setValueAtTime(f,t); g.gain.setValueAtTime(.10,t); g.gain.exponentialRampToValueAtTime(.0001,t+0.18);
    o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+0.2);
    // soft octave sparkle
    const o2=a.createOscillator(),g2=a.createGain(); o2.type='sine'; o2.frequency.setValueAtTime(f*2,t);
    g2.gain.setValueAtTime(.04,t); g2.gain.exponentialRampToValueAtTime(.0001,t+0.12);
    o2.connect(g2); g2.connect(a.destination); o2.start(t); o2.stop(t+0.14);
  } };

/* ---------- helpers ---------- */
const clamp=(v,a,b)=>v<a?a:v>b?b:v, lerp=(a,b,t)=>a+(b-a)*t, rand=(a,b)=>a+Math.random()*(b-a);
const TAU=Math.PI*2;
/* seeded RNG — only the run's node generation uses it, so the Daily Challenge
   serves every player the same layout/specials. Visual randomness stays live. */
function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
let RUN_RNG=Math.random;                 // swapped to a seeded generator for Daily runs
const rrand=(a,b)=>a+RUN_RNG()*(b-a);    // seeded rand for gameplay generation
function hexA(hex,a){ hex=(hex||'#fff').replace('#',''); if(hex.length===3) hex=hex.split('').map(c=>c+c).join('');
  const n=parseInt(hex,16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }

let FX = ((window.devicePixelRatio||1) < 1.5 && Math.min(window.screen?window.screen.width:999, window.screen?window.screen.height:999) <= 380) ? 'medium' : 'high';
// user can lock FX level — 'auto' lets the runtime auto-downgrade, anything else is fixed
let FX_USER = Store.get('coil_fx','auto');
if(FX_USER!=='auto') FX = FX_USER;
function setFXUser(level){ FX_USER=level; Store.set('coil_fx',level); if(level!=='auto') FX=level; }
function glowFX(v){ return FX==='low' ? Math.min(v,3) : FX==='medium' ? v*0.55 : v; }
function pcount(n){ return FX==='low' ? Math.ceil(n*0.4) : FX==='medium' ? Math.ceil(n*0.7) : n; }

function distPointToSegment(px,py,ax,ay,bx,by){
  const abx=bx-ax, aby=by-ay, apx=px-ax, apy=py-ay;
  const ab2=abx*abx+aby*aby;
  const t=ab2>0?clamp((apx*abx+apy*aby)/ab2,0,1):0;
  const cx=ax+abx*t, cy=ay+aby*t;
  return Math.hypot(px-cx,py-cy);
}
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function text(t,x,y,size,color,weight=700,glow=0,align='center',font="'Sora'"){
  ctx.save(); ctx.font=`${weight} ${size}px ${font}, sans-serif`; ctx.textAlign=align; ctx.textBaseline='middle';
  if(glow){ctx.shadowColor=color;ctx.shadowBlur=glowFX(glow);} ctx.fillStyle=color; ctx.fillText(t,x,y);
  if(glow)ctx.fillText(t,x,y); ctx.restore();
}

/* ---------- shake ---------- */
let shakeT=0,shakeMag=0; function shake(m,t=.25){shakeMag=Math.max(shakeMag,m);shakeT=Math.max(shakeT,t);}

/* ---------- base spark particles ---------- */
const PCAP=240;
const P={a:[],burst(x,y,n,c,sp=220,life=.5,sz=4){n=pcount(n);for(let i=0;i<n;i++){const an=Math.random()*TAU,s=rand(sp*.3,sp);
    this.a.push({x,y,vx:Math.cos(an)*s,vy:Math.sin(an)*s,life,max:life,c,sz:rand(sz*.5,sz)});}
    if(this.a.length>PCAP) this.a.splice(0,this.a.length-PCAP);},
  ring(x,y,c,n=18,sp=260){n=pcount(n);for(let i=0;i<n;i++){const an=i/n*TAU;this.a.push({x,y,vx:Math.cos(an)*sp,vy:Math.sin(an)*sp,life:.5,max:.5,c,sz:3});}
    if(this.a.length>PCAP) this.a.splice(0,this.a.length-PCAP);},
  upd(dt){for(let i=this.a.length-1;i>=0;i--){const p=this.a[i];p.life-=dt;if(p.life<=0){ this.a[i]=this.a[this.a.length-1]; this.a.pop(); continue;}p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.96;p.vy*=.96;}},
  draw(){for(const p of this.a){const al=clamp(p.life/p.max,0,1);ctx.globalAlpha=al;ctx.fillStyle=p.c;
    ctx.beginPath();ctx.arc(p.x,p.y,p.sz*al,0,TAU);ctx.fill();}ctx.globalAlpha=1;},
  clear(){this.a.length=0;}};

/* ---------- score popups + toasts ---------- */
const Pop={a:[],add(x,y,t,c){this.a.push({x,y,t,c,life:1});},
  upd(dt){for(let i=this.a.length-1;i>=0;i--){const p=this.a[i];p.life-=dt*1.2;p.y-=30*dt;if(p.life<=0){ this.a[i]=this.a[this.a.length-1]; this.a.pop(); }}},
  draw(){for(const p of this.a){ctx.globalAlpha=clamp(p.life,0,1);text(p.t,p.x,p.y,16,p.c,700,8);}ctx.globalAlpha=1;},
  clear(){this.a.length=0;}};

/* =========================================================================
   CASINO FX SYSTEMS (new)
   ========================================================================= */

/* ---- spinning gold coins with gravity + bounce off floor ---- */
const COINCAP=140;
const Coins={a:[],
  spawn(x,y,n,opt){ opt=opt||{}; n=pcount(n); const up=opt.up||0, fountain=opt.fountain;
    for(let i=0;i<n;i++){
      const a=fountain? (-Math.PI/2 + rand(-0.85,0.85)) : Math.random()*TAU;
      const sp=fountain? rand(280,560) : rand(90,300);
      this.a.push({x,y,vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-up, spin:rand(-14,14), rot:Math.random()*TAU,
        life:rand(1.0,1.8), sz:rand(7,11), grav:opt.grav||1000, bounced:false});
    }
    if(this.a.length>COINCAP) this.a.splice(0,this.a.length-COINCAP); },
  upd(dt){ for(let i=this.a.length-1;i>=0;i--){ const c=this.a[i]; c.life-=dt;
    if(c.life<=0){ this.a[i]=this.a[this.a.length-1]; this.a.pop(); continue; }
    c.vy+=c.grav*dt; c.x+=c.vx*dt; c.y+=c.vy*dt; c.rot+=c.spin*dt; c.vx*=0.992;
    if(!c.bounced && c.y>H-6 && c.vy>0){ c.vy*=-0.42; c.vx*=0.6; if(Math.abs(c.vy)<60){c.bounced=true;} } } },
  draw(){ for(const c of this.a){ const al=clamp(c.life*1.6,0,1);
    const w=Math.abs(Math.cos(c.rot))*c.sz+1.6;
    ctx.save(); ctx.translate(c.x,c.y); ctx.globalAlpha=al;
    ctx.fillStyle='#ffcf3a'; ctx.shadowColor='#ffb020'; ctx.shadowBlur=glowFX(9);
    ctx.beginPath(); ctx.ellipse(0,0,w,c.sz,0,0,TAU); ctx.fill(); ctx.shadowBlur=0;
    ctx.fillStyle='#fff3b0'; ctx.beginPath(); ctx.ellipse(-w*0.18,-c.sz*0.18,w*0.5,c.sz*0.5,0,0,TAU); ctx.fill();
    ctx.fillStyle='#d9881a'; ctx.beginPath(); ctx.ellipse(0,0,Math.max(0.8,w*0.22),c.sz*0.34,0,0,TAU); ctx.fill();
    ctx.restore(); } ctx.globalAlpha=1; },
  clear(){ this.a.length=0; } };

/* ---- confetti (burst + rain) ---- */
const CONFCAP=170;
const CONF_COLORS=['#2ff3e0','#ff4d8d','#ffd24a','#9be35a','#a76bff','#ffffff'];
const Confetti={a:[],
  burst(x,y,n){ n=pcount(n); for(let i=0;i<n;i++){ const a=-Math.PI/2+rand(-1.3,1.3), sp=rand(200,500);
    this.a.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,rot:Math.random()*TAU,spin:rand(-16,16),life:rand(1.1,2.1),
      w:rand(5,9),h:rand(8,14),c:CONF_COLORS[(Math.random()*CONF_COLORS.length)|0],sway:rand(1,3),swp:Math.random()*TAU}); }
    if(this.a.length>CONFCAP) this.a.splice(0,this.a.length-CONFCAP); },
  rain(n){ n=pcount(n); for(let i=0;i<n;i++){ this.a.push({x:rand(0,W),y:rand(-50,-4),vx:rand(-30,30),vy:rand(70,180),
      rot:Math.random()*TAU,spin:rand(-12,12),life:rand(1.8,3.4),w:rand(5,9),h:rand(8,14),

function bigWinAudio(intensity){
  if(muted) return; const a=ac(); if(!a) return;
  // sparkle (high-freq shimmer) — denser & longer with intensity
  const spk=Math.round(3+intensity*5);
  for(let i=0;i<spk;i++) setTimeout(()=>tone(1700+i*120+Math.random()*500,.08,'triangle',.10),i*16);
  // chord (mid harmonic, major triad)
  const root=523*(1+intensity*0.05);
  [root, root*1.26, root*1.5].forEach((f,i)=>setTimeout(()=>tone(f,.34,'sawtooth',.07-i*0.012),i*4));
  // thump (low bass) — visceral hit
  setTimeout(()=>{ const t=a.currentTime; const o=a.createOscillator(),g=a.createGain();
    o.type='sine'; o.frequency.setValueAtTime(120,t); o.frequency.exponentialRampToValueAtTime(50,t+0.18);
    g.gain.setValueAtTime(.32,t); g.gain.exponentialRampToValueAtTime(.0001,t+0.22);
    o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+0.24); }, 0);
}
function cymbal(d){ d=d||0.4; if(muted) return; const a=ac(); if(!a) return; const n=Math.floor(a.sampleRate*d);
  const b=a.createBuffer(1,n,a.sampleRate),dd=b.getChannelData(0);

}

function genNode(){
  const idx=G.nodes.length;
  const hm=G.lastNodeY/12;
  const opening=idx<4;
  const easy=idx<8 || hm<60;
  const diff=clamp(hm/600,0,1);
  const gapMin=opening?80:easy?85:108, gapMax=opening?100:easy?112:lerp(140,195,diff);
  const gap=rrand(gapMin,gapMax);
  const ny=G.lastNodeY+gap;
  const prev=G.nodes[G.nodes.length-1];
  const maxOff=Math.min(gap*0.9, opening?26:easy?55:lerp(75,140,diff));
  let nx=clamp((prev?prev.wx:W/2)+rrand(-maxOff,maxOff), 50, W-50);

  let type='normal', r=18;
  if(!easy){
    const roll=RUN_RNG();
    if(hm>120 && roll<0.09+diff*0.09){ type='small'; r=12; }
    else if(hm>200 && roll<0.20+diff*0.10){ type='move'; r=16; }
    else {
      // new one-tap depth: special nodes are readable, rare, and cosmetic/temporary.
      const sr=RUN_RNG();
      if(hm>160 && sr<0.075){ type='boost'; r=17; }
      else if(hm>230 && sr<0.135){ type='reverse'; r=17; }
      else if(hm>300 && sr<0.185){ type='slow'; r=17; }
      else if(hm>380 && sr<0.235){ type='magnet'; r=17; }
      else if(hm>470 && sr<0.285){ type='cracked'; r=16; }
    }
  }
  if(!easy && hm>150 && RUN_RNG()<0.04){ type='bonus'; r=19; }

  const node={wx:nx, wy:ny, r, type, baseX:nx,
    amp:type==='move'?rrand(35,80):0, ph:rrand(0,TAU), spd:rrand(.7,1.3),
    pts:type==='small'?3:1, pulse:rrand(0,TAU)};
  G.nodes.push(node); G.lastNodeY=ny;

  if(!easy && hm>320 && RUN_RNG()<0.06+diff*0.14){
    const sx=clamp(nx+(nx<W/2?rrand(95,150):-rrand(95,150)), 28, W-28);
    G.nodes.push({wx:sx, wy:ny+rrand(-26,26), r:15, type:'spike', baseX:sx, amp:0, pulse:rrand(0,TAU)});
  }
  if(RUN_RNG()<0.5) G.sparks.push({wx:clamp(nx+rrand(-60,60),20,W-20), wy:ny-gap*0.5, got:false, kind:'spark'});
  else if(hm>250 && RUN_RNG()<0.05) G.sparks.push({wx:clamp(nx+rrand(-50,50),20,W-20), wy:ny-gap*0.5, got:false, kind:'shield'});
}

  if(scene!=='play') return;
  // anticipation freeze: when a huge event fires, briefly hold the world for impact
  if(G.freezeT>0){ G.freezeT-=dt; if(G.freezeT>0) return; }
  const pl=G.player;
  if(G.invuln>0) G.invuln-=dt;
  if(G.slowMoT>0) G.slowMoT=Math.max(0,G.slowMoT-dt);
  if(pl.zap>0) pl.zap-=dt;
  if(G.frameGlow>0) G.frameGlow-=dt*1.6;
  if(G.bestPop>0) G.bestPop-=dt*2;
  Pot.tick(dt);
  // FRENZY timer countdown — when it ends, bank a bonus payout with fanfare
  if(G.frenzyT>0){ G.frenzyT-=dt;
    if(G.frenzyT<=0){
      G.frenzyT=0;
      const bonus = Math.max(20, G.frenzyCoinsBanked); G.coins += Math.round(bonus*0.5);  // 50% top-up bonus
      Callout.add('FRENZY BONUS  +'+Math.round(bonus*0.5)+' ★','#ffd24a',false);
      cymbal(0.4); SFX.chaching(); Confetti.burst(W/2,H*0.4,pcount(24));
    }
  }
  // honest near-miss-to-best toast (only fires once per run, only when actually close to record)
  if(!G.bestNearShown && Profile.best>0 && !G.beatBest && Profile.best-G.height>0 && Profile.best-G.height<40){
    G.bestNearShown=true; Callout.add('SO CLOSE TO YOUR BEST','#ffb020',false); vib(15);
  }

  if(G.dead){ G.deadT+=dt; pl.vy-=G_FALL*dt; pl.wx+=pl.vx*dt; pl.wy+=pl.vy*dt;
    if(G.deadT>0.55) endRun(); return; }
  G.t+=dt;
  // ambient sparkle life — the screen feels alive during hot streaks & FRENZY
  G.sparkAcc=(G.sparkAcc||0)+dt;
  const _sr = G.frenzyT>0? 0.05 : G.mult>=6? 0.12 : G.mult>=4? 0.26 : 0;
  if(_sr>0 && G.sparkAcc>=_sr){ G.sparkAcc=0;
    const _sc = G.frenzyT>0? ['#ffd24a','#ff4d8d','#2ff3e0'][(Math.random()*3)|0] : skin().t;
    Sparkles.pop(rand(0,W), rand(0,H*0.82), _sc); }

  for(const n of G.nodes){ if(n.type==='move') n.wx=n.baseX+Math.sin(G.t*n.spd+n.ph)*n.amp; }

  if(pl.latched){
    const n=pl.node;
    pl.ang+=pl.dir*OMEGA*dt;
    pl.charge=clamp(pl.charge+(dt/CHARGE_TIME)*(G.slowMoT>0?0.58:1),0,1);
    pl.wx=n.wx+Math.cos(pl.ang)*pl.R;
    pl.wy=n.wy+Math.sin(pl.ang)*pl.R;
    pl.face=lerp(pl.face, Math.atan2(Math.cos(pl.ang)*pl.dir, -Math.sin(pl.ang)*pl.dir), Math.min(1,dt*10));
  } else {
    const prevWx=pl.wx, prevWy=pl.wy;
    pl.vy-=G_FALL*dt;
    pl.wx+=pl.vx*dt; pl.wy+=pl.vy*dt;
    if(pl.wx<pl.r){ pl.wx=pl.r; pl.vx=Math.abs(pl.vx)*WALL_BOUNCE; }
    if(pl.wx>W-pl.r){ pl.wx=W-pl.r; pl.vx=-Math.abs(pl.vx)*WALL_BOUNCE; }
    pl.face=lerp(pl.face, Math.atan2(pl.vy,pl.vx), Math.min(1,dt*10));
    pl.trail.push({x:pl.wx,y:pl.wy}); if(pl.trail.length>12) pl.trail.shift();
    const pad=curCatchPad();
    for(const n of G.nodes){
      const sd=distPointToSegment(n.wx,n.wy, prevWx,prevWy, pl.wx,pl.wy);
      if(n.type==='spent') continue;
      if(n.type==='spike'){ if(sd<n.r+pl.r){ hit('spike'); return; } continue; }
      if(sd<n.r+pl.r+pad && n!==pl.lastReleased){
        const dx=pl.wx-n.wx, dy=pl.wy-n.wy, d=Math.hypot(dx,dy)||0.0001;
        latch(n,d,dx,dy); break;
      }
    }
    pl.lastReleasedT=(pl.lastReleasedT||0)+dt; if(pl.lastReleasedT>0.25) pl.lastReleased=null;
  }

  G.maxY=Math.max(G.maxY,pl.wy);
  G.height=Math.max(0,Math.round((G.maxY+90)/12));
  const camTarget=pl.wy-0.42*H;
  if(camTarget>G.cameraY) G.cameraY=lerp(G.cameraY,camTarget,Math.min(1,dt*6));

  if(!G.beatBest && Profile.best>0 && G.height>Profile.best){ G.beatBest=true; G.bestPop=1;
    Callout.add('NEW BEST!','#9be35a',true); SFX.riser(0.45); bigWinAudio(1.0); cymbal(0.5); cheerSwell(.6,.18);
    Confetti.rain(pcount(60)); Flash.hit('#9be35a',0.4); shake(7,.35); vib([30,30,80]);
    const bx2=pl.wx, by2=sY(pl.wy);
    Shock.ring(bx2,by2,'#9be35a',{r0:16,r1:Math.max(W,H)*0.9,lw:6,life:0.65});
    setTimeout(()=>Shock.ring(bx2,by2,'#fff',{r0:10,r1:W*0.8,lw:4,life:0.6}),100);
    Sparkles.scatter(20,'#9be35a');
    G.freezeT=0.22; }

  while(G.nextMilestone<MILESTONES.length && G.height>=MILESTONES[G.nextMilestone]){
    const m=MILESTONES[G.nextMilestone]; G.nextMilestone++;
    const rw=MILE_REWARD[m]||10;
    G.coins+=rw;
    const big = m>=500;
    Callout.add(m+' M  +'+rw+' ★', '#fff', big);
    if(big){
      // big milestone — full party
      Confetti.rain(pcount(50)); Coins.spawn(W/2,H*0.4,pcount(20),{fountain:true,up:100});
      Flash.hit('#ffd24a',0.32); shake(5,.22); vib([20,20,60]);
      Shock.ring(W/2,H*0.4,'#ffd24a',{r0:20,r1:W*0.95,lw:6,life:0.6});
      Sparkles.scatter(16,'#ffd24a');
      { const b=bankXY(); FlyCoins.send(W/2,H*0.4, Math.min(12,rw), b.x,b.y); }
      bigWinAudio(0.8); cymbal(0.45); G.freezeT=0.18;
    } else {
      // small milestone — tasteful but clear
      Confetti.burst(W/2,H*0.4,pcount(14)); Coins.spawn(W/2,H*0.4,pcount(7),{fountain:true,up:70});
      Shock.ring(W/2,H*0.4,'#fff',{r0:16,r1:W*0.6,lw:4,life:0.5});
      { const b=bankXY(); FlyCoins.send(W/2,H*0.4, Math.min(8,rw), b.x,b.y); }
      shake(3,.14); vib(25); SFX.milestone();
    }
  }

  let z=0; for(let i=0;i<ZONES.length;i++) if(G.height>=ZONES[i].from) z=i;
  if(z!==G.zone){ G.zone=z; Callout.add(ZONES[z].name, skin().t, true); Flash.hit(skin().c,0.2); }

  // void rise: capped autonomous rate + stall multiplier — skilled play always escapes,
  // camping still loses. Was: (vbase+t*4) uncapped + 0.55H catchup which became unwinnable past ~60s.
  if(G.maxY > G.lastClimbY+8){ G.lastClimbY=G.maxY; G.stallT=0; } else G.stallT+=dt;
  const stallMul = 1 + clamp(G.stallT-2.0, 0, 4) * 0.45;        // grace 2s, then ramp up to ~2.8x
  const frenzyVoidEase = (G.frenzyT>0) ? 0.55 : 1.0;            // void chills out during FRENZY (flow protection)
  const autoRate = Math.min(220, G.vbase + G.t*1.8) * stallMul * frenzyVoidEase;
  G.voidY += autoRate * dt;
  const maxLead=lerp(H*1.35, H*0.78, clamp(G.t/120,0,1));        // never closer than ~0.78H to player
  G.voidY=Math.max(G.voidY,pl.wy-maxLead);
  if(G.invuln<=0 && pl.wy<=G.voidY+pl.r){ hit('void'); return; }
  if(sY(pl.wy)>H+160 && !pl.latched && G.invuln<=0){ hit('fall'); return; }

  for(const s of G.sparks){ if(s.got) continue;
    if(Math.hypot(pl.wx-s.wx,pl.wy-s.wy)<24){
      s.got=true;
      if(s.kind==='shield'){ G.shield=true; SFX.shield(); P.ring(s.wx,sY(s.wy),'#9ffff2',16,200); Pop.add(s.wx,sY(s.wy),'SHIELD','#9ffff2'); Rays.burst(s.wx,sY(s.wy),'#9ffff2',10); }
      else { G.coins+=2; SFX.chaching(); Coins.spawn(s.wx,sY(s.wy),pcount(5),{up:60}); P.burst(s.wx,sY(s.wy),5,'#ffe39b',160,.4,3); Pop.add(s.wx,sY(s.wy),'+2 ★',skin().t); Shock.ring(s.wx,sY(s.wy),'#ffe39b',{r0:6,r1:42,lw:2.5,life:0.4}); { const b=bankXY(); FlyCoins.send(s.wx,sY(s.wy),3,b.x,b.y); } }
    } }

  while(G.lastNodeY < pl.wy + H*1.5) genNode();
  G.nodes=G.nodes.filter(n=>n.wy>G.voidY-120);
  G.sparks=G.sparks.filter(s=>!s.got && s.wy>G.voidY-120);

  if(G.tut>=0){
    G.tutT+=dt;
    if(G.tut===1 && G.tutT>5) { G.tut=2; G.tutT=0; }
    if(G.tut===2 && G.tutT>3.5){ G.tut=-1; if(!seenTut){ seenTut=true; Store.set('coil_seen_tut_v2',true); } }
  }
}

function latch(n,d,dx,dy){
  const pl=G.player;
  pl.latched=true; pl.node=n; pl.R=clamp(d,MINR,MAXR); pl.ang=Math.atan2(dy,dx);
  const cross=pl.vx*Math.sin(pl.ang)-pl.vy*Math.cos(pl.ang); pl.dir=cross>=0?1:-1;
  pl.charge=0; pl.trail.length=0;
  G.combo++; G.maxCombo=Math.max(G.maxCombo,G.combo);
  SFX.catch(G.combo); vib(6);
  P.burst(n.wx,sY(n.wy),8,skin().c,140,.35,3.5);
  if(G.magnetJumps>0 && n.type!=='magnet') G.magnetJumps=Math.max(0,G.magnetJumps-1);
  if(n.type==='boost'){ G.boostNext=1; Pop.add(n.wx,sY(n.wy)-18,'BOOST','#ffd24a'); Shock.ring(n.wx,sY(n.wy),'#ffd24a',{r0:n.r,r1:76,lw:4,life:.42}); SFX.bonus(); }
  else if(n.type==='reverse'){ pl.dir*=-1; Pop.add(n.wx,sY(n.wy)-18,'REVERSE','#ff4d8d'); Shock.ring(n.wx,sY(n.wy),'#ff4d8d',{r0:n.r,r1:72,lw:4,life:.42}); SFX.coinCascade(3); }
  else if(n.type==='slow'){ G.slowMoT=2.2; Pop.add(n.wx,sY(n.wy)-18,'FOCUS','#9ffff2'); Shock.ring(n.wx,sY(n.wy),'#9ffff2',{r0:n.r,r1:80,lw:4,life:.5}); SFX.shield(); }
  else if(n.type==='magnet'){ G.magnetJumps=2; Pop.add(n.wx,sY(n.wy)-18,'MAGNET','#9be35a'); Shock.ring(n.wx,sY(n.wy),'#9be35a',{r0:n.r,r1:84,lw:4,life:.5}); SFX.chaching(); }
  else if(n.type==='cracked'){ Pop.add(n.wx,sY(n.wy)-18,'ONE USE','#ffd0d8'); }
  if(n.type==='bonus'){
    // STAR VAULT: bonus node caught while on x9 = win the entire vault. Rare, skill-only.
    if(G.mult>=9 && !G.jackpotHit){
      G.jackpotHit=true;
      const won=Pot.win();
      G.coins+=won;
      const cx2=n.wx, cy2=sY(n.wy);
      Callout.add('STARFALL! +'+won+' ★','#ffd24a',true);
      SFX.riser(0.5); bigWinAudio(1.4); cymbal(0.6); cheerSwell(.9,.22);
      Coins.spawn(cx2,cy2,pcount(46),{fountain:true,up:220});
      Confetti.rain(pcount(90)); Rays.burst(cx2,cy2,'#ffd24a',26);
      // cascading shock rings + a screen-wide sparkle storm
      Shock.ring(cx2,cy2,'#ffd24a',{r0:20,r1:Math.max(W,H),lw:8,life:0.7,fill:true});
      setTimeout(()=>Shock.ring(cx2,cy2,'#fff',{r0:10,r1:W*0.9,lw:5,life:0.6}),90);
      setTimeout(()=>Shock.ring(cx2,cy2,'#ff4d8d',{r0:10,r1:W*0.8,lw:4,life:0.6}),180);
      Sparkles.scatter(28,'#ffd24a');
      { const b=bankXY(); FlyCoins.send(cx2,cy2, 16, b.x,b.y); }
      Flash.hit('#ffd24a',0.6); shake(14,.55); vib([60,40,60,40,120]);
      CGSDK.happytime();
      G.freezeT=0.30;
    } else {
      // ordinary bonus catch — proportionate, not full-party
      const g=25; G.coins+=g; SFX.chaching(); SFX.coinCascade(4); vib(15);
      Coins.spawn(n.wx,sY(n.wy),pcount(7),{fountain:true,up:90});
      Rays.burst(n.wx,sY(n.wy),'#ffd24a',8);
      Shock.ring(n.wx,sY(n.wy),'#ffd24a',{r0:n.r,r1:92,lw:4,life:0.45});
      { const b=bankXY(); FlyCoins.send(n.wx,sY(n.wy), 8, b.x,b.y); }
      Pop.add(n.wx,sY(n.wy)-16,'+'+g+' ★','#ffd24a'); shake(2.5,.12);
    }
    n.type='normal'; n.r=18;
  }
  if(G.tut===0){ G.tut=1; G.tutT=0; }
}

function release(){
  const pl=G.player; if(!pl.latched) return;
  const tx=-Math.sin(pl.ang)*pl.dir, ty=Math.cos(pl.ang)*pl.dir;
  const ch=pl.charge, pHi=perfectHi();
  const perfect = ch>=PERFECT_LO && ch<=pHi;
  const launchPower = LAUNCH * (G.boostNext?1.28:1);
  pl.vx=tx*launchPower; pl.vy=ty*launchPower;
  if(G.boostNext){ G.boostNext=0; P.ring(pl.wx,sY(pl.wy),'#ffd24a',18,360); shake(2.5,.12); }
  if(pl.node && pl.node.type==='cracked'){ pl.node.type='spent'; pl.node.r=Math.max(5,pl.node.r*0.6); }
  pl.latched=false; pl.lastReleased=pl.node; pl.lastReleasedT=0;
  G.releases++;

  if(perfect){
    G.perfects++; G.mult=Math.min(9,G.mult+1); G.perfectStreak++;
    G.overdrive = clamp(G.overdrive + 0.10 + G.mult*0.025, 0, 1);
    const frenzyMul = (G.frenzyT>0)? 2 : 1;
    const gain=Math.round(5*G.mult)*frenzyMul; G.coins+=gain;
    if(G.frenzyT>0) G.frenzyCoinsBanked+=gain;
    const m=G.mult, sx=pl.wx, sy=sY(pl.wy), sk=skin();

    /* ============================================================
       STRICT VFX HIERARCHY — keep big moments BIG by restraining small ones
       Tier 1 (x1-x3): clean perfect feel, no flash, no confetti
       Tier 2 (x4-x6): adds frame glow + tier callout + small coin spawn + soft rays
       Tier 3 (x7-x8): adds bigger rays + small confetti + chime + small flash
       Tier 4 (x9):    STARFALL — full party (the rare elite moment)
       ============================================================ */
    SFX.perfect(m); vib(6+m*2);
    P.ring(sx,sy,'#fff',16+m*2,260+m*20);
    P.burst(sx,sy,4+m,sk.t,180+m*15,.4,3.5);
    Pop.add(sx,sy-18,'+'+gain+' ★','#ffd24a');
    shake(1.5 + m*0.25, .12);
    pl.zap=0.18 + m*0.012;
    // shock ring — scales with the chain, so a long combo visibly hits harder
    Shock.ring(sx,sy, m>=7?'#ffd24a':sk.c, {r0:pl.r, r1:58+m*16, lw:3+m*0.4, life:0.45});
    // a few coins fly to the balance counter — the satisfying "deposit"
    { const b=bankXY(); FlyCoins.send(sx,sy, Math.min(9, 2+Math.floor(m*0.7)), b.x,b.y); }

    if(m>=4){
      // Tier 2+: glow the frame, small coin spawn, tier callout, soft ray
      G.frameGlow=Math.min(1.2, G.frameGlow+0.30+m*0.05);
      Coins.spawn(sx,sy,pcount(2+Math.floor(m*0.6)),{fountain:true,up:80});
      if(m===4) SFX.coinCascade(3);  // first time crossing into tier 2: small cascade
      const tier=multTier(m);
      if(tier && m>G.shownTier){ G.shownTier=m;
        Callout.add(tier.word+'  x'+m, tier.c, m>=7);
      }
    }
    if(m>=7){
      // Tier 3: rays + small confetti + chime + small flash
      Rays.burst(sx,sy, m>=9?'#ffd24a':'#fff', 8+m);
      Confetti.burst(sx,sy,pcount(8+m*2));
      SFX.chaching(); SFX.coinCascade(m);
      Flash.hit(sk.c, 0.10 + (m-7)*0.05);
    }
    if(m>=9){
      // Tier 4: STARFALL — full party reserved for the elite moment
      Confetti.rain(pcount(36));
      bigWinAudio(0.7); cheerSwell(.4,.12); cymbal(0.35);
      Flash.hit('#ffd24a',0.32); shake(6,.25); vib([20,30,80]);
    }

    /* OVERDRIVE FULL → trigger FRENZY mode (skill-earned event state) */
    if(G.overdrive>=1 && G.frenzyT<=0){
      G.overdrive=0; G.frenzyT=G.frenzyMaxT; G.frenzyCoinsBanked=0; FrenzyMusic.step=0;
      Callout.add('FRENZY!','#ffd24a',true);
      SFX.riser(0.5); bigWinAudio(1.0); cymbal(0.5); cheerSwell(.7,.18);
      Confetti.rain(pcount(40)); Coins.spawn(W/2,H*0.5,pcount(20),{fountain:true,up:160});
      Shock.ring(W/2,H*0.5,'#ffd24a',{r0:20,r1:Math.max(W,H),lw:7,life:0.65,fill:true});
      setTimeout(()=>Shock.ring(W/2,H*0.5,'#ff4d8d',{r0:10,r1:W*0.85,lw:4,life:0.6}),110);
      Sparkles.scatter(26,'#ffd24a');
      Flash.hit('#ffd24a',0.45); shake(8,.4); vib([40,30,40,30,80]);
      CGSDK.happytime();
      G.freezeT=0.18;
    }
  } else {
    G.mult=1; G.shownTier=0; G.perfectStreak=0;
    SFX.whoosh(0.5);
    P.ring(pl.wx,sY(pl.wy),skin().c,12,200);
  }

  if(G.tut===0){ G.tut=1; G.tutT=0; }
  if(G.tut===1 && (perfect || G.releases>=4)){ G.tut=2; G.tutT=0; }
}

function hit(cause){
  const pl=G.player;
  if(G.shield && cause!=='fall'){
    G.shield=false; G.invuln=0.7; pl.vy=720; pl.latched=false;
    SFX.shield(); shake(7,.3); P.ring(pl.wx,sY(pl.wy),'#9ffff2',26,360);
    Rays.burst(pl.wx,sY(pl.wy),'#9ffff2',16); Flash.hit('#9ffff2',0.25);
    Shock.ring(pl.wx,sY(pl.wy),'#9ffff2',{r0:pl.r,r1:W*0.6,lw:5,life:0.5});
    Callout.add('SHIELD!','#9ffff2',false); return;
  }
  if(G.dead) return;
  G.dead=true; G.deadT=0; pl.latched=false;
  SFX.death(); shake(11,.5);
  P.burst(pl.wx,sY(pl.wy),30,skin().c,360,.7,7);
  Shock.ring(pl.wx,sY(pl.wy),'#ff3b5c',{r0:pl.r,r1:W*0.7,lw:5,life:0.55});
  Flash.hit('#ff3b5c',0.4);
}

/* a revive is worth offering once per run, when the player has real height to
   save and is past the tutorial. The actual ad only plays on the platform. */
function canOfferRevive(){ return !G.usedRevive && !G.reviveOffered && G.tut<0 && G.height>=80; }

function endRun(){
  if(canOfferRevive()){ ReviveOffer.start(); return; }
  finalizeRun();
}

/* rewarded REVIVE — drop the void away, hand the player a fresh node + shield,
   keep their combo. Massively extends average session length (a key CG KPI). */
function reviveRun(){
  const pl=G.player;
  const safeWY=G.maxY;                                   // restore to the peak they reached
  G.dead=false; G.deadT=0; G.usedRevive=true;
  G.invuln=1.8; G.shield=true;
  G.voidY=Math.min(G.voidY, safeWY - H*1.15);            // shove the void far down
  G.stallT=0; G.lastClimbY=safeWY; G.freezeT=0;
  G.cameraY=safeWY-0.42*H;                               // snap camera back up
  const nx=clamp(pl.wx,50,W-50), ny=safeWY+40;
  const node={wx:nx, wy:ny, r:20, type:'normal', baseX:nx, pulse:0};
  G.nodes.push(node);
  pl.latched=true; pl.node=node; pl.R=60; pl.ang=-Math.PI/2; pl.dir=1;
  pl.charge=0; pl.vx=0; pl.vy=0; pl.trail.length=0; pl.lastReleased=null; pl.zap=0;
  pl.wx=node.wx+Math.cos(pl.ang)*pl.R; pl.wy=node.wy+Math.sin(pl.ang)*pl.R;
  while(G.lastNodeY < pl.wy + H*1.5) genNode();
  scene='play'; CGSDK.gameplayStart();
  SFX.shield(); cheerSwell(.5,.14); Flash.hit('#9ffff2',0.4); shake(7,.32); vib([20,40,20]);
  Shock.ring(pl.wx,sY(pl.wy),'#9ffff2',{r0:pl.r,r1:W*0.8,lw:5,life:0.55});
  Callout.add('REVIVED!','#9ffff2',true);
}

function finalizeRun(){
  CGSDK.gameplayStop();
  const h=G.height, mc=G.maxCombo, perf=G.perfects, coins=G.coins;
  const newBest=Profile.setBest(h);
  const xpGain=h + perf*6 + mc*3 + 10;
  const prevLvl=Profile.level();
  Profile.addXP(xpGain); Profile.addCoins(coins);
  const leveledUp=Profile.level()>prevLvl;
  totalRuns++; Store.set('coil_total_runs',totalRuns); runsSinceAd++;
  // Daily Challenge medals (one-time per day)
  let dailyMedals=[];
  if(G.daily) dailyMedals=DailyRun.finish(h);
  const dDone = [Daily.report('runs',1),Daily.report('perf',perf),Daily.report('coins',coins),
                Daily.report('height',h),Daily.report('combo',mc)].some(Boolean);
  if(leveledUp||dDone||dailyMedals.length) SFX.unlock();
  if(newBest) CGSDK.happytime();
  Pot.save();
  // genuine achievement checks — only fire for things the player actually accomplished
  const summary = { best:Profile.best, runPerf:perf, maxCombo:mc, frenzied:G.frenzyT>0||G.frenzyCoinsBanked>0,
                    streak:Streak.count, potWon:G.jackpotHit };
  const newAch = Ach.check(summary);
  Result.show({h,mc,perf,coins,newBest,xpGain,leveledUp,dailyJustDone:dDone, achievements:newAch,
               potWon:G.jackpotHit, daily:G.daily, dailyMedals});
  scene='over';
}

const STARS=[]; for(let i=0;i<64;i++) STARS.push({x:Math.random(),y:Math.random(),d:rand(0.08,0.45),s:rand(1,2.4),a:rand(.12,.4)});
/* a brighter, twinkling near layer for depth */
const STARS2=[]; for(let i=0;i<26;i++) STARS2.push({x:Math.random(),y:Math.random(),d:rand(0.5,0.95),s:rand(1.4,2.8),a:rand(.3,.6),tw:Math.random()*TAU,ts:rand(2,5)});

/* sweeping casino spotlight beams from the top — atmosphere, gated by FX */
function drawSpotlights(t){
  if(FX==='low') return;
  ctx.save(); ctx.globalCompositeOperation='lighter';
  const beams=FX==='medium'?2:3;
  const cols=['#2ff3e0','#ff4d8d','#ffd24a'];
  for(let i=0;i<beams;i++){
    const ph=t*0.5 + i*2.1;
    const ox=W*0.5 + Math.sin(ph)*W*0.55;
    const spread=W*0.10;
    const g=ctx.createLinearGradient(W/2,-20,ox,H*0.85);
    const c=cols[i%cols.length];
    g.addColorStop(0,c); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.globalAlpha=0.06;
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.moveTo(W*0.5-6,-20); ctx.lineTo(W*0.5+6,-20);
    ctx.lineTo(ox+spread,H*0.9); ctx.lineTo(ox-spread,H*0.9); ctx.closePath(); ctx.fill();
  }
  ctx.restore(); ctx.globalAlpha=1;
}

function drawBG(){
  const h=G.height||0;
  let z0=ZONES[0],z1=ZONES[0],tt=0;
  for(let i=0;i<ZONES.length;i++){ if(h>=ZONES[i].from){ z0=ZONES[i]; z1=ZONES[Math.min(i+1,ZONES.length-1)];
    const span=(z1.from-z0.from)||1; tt=clamp((h-z0.from)/span,0,1); } }
  const mix=(a,b)=>{ const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16);
    const r=Math.round(lerp((pa>>16)&255,(pb>>16)&255,tt)), g=Math.round(lerp((pa>>8)&255,(pb>>8)&255,tt)), bl=Math.round(lerp(pa&255,pb&255,tt));
    return `rgb(${r},${g},${bl})`; };
  const wld=world();
  const bg0=wld.bg||z0.bg, bg1=wld.alt||z1.bg;
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,mix(bg0[0],bg1[0])); g.addColorStop(.5,mix(bg0[1],bg1[1])); g.addColorStop(1,mix(bg0[2],bg1[2]));
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const cam=G.cameraY||0;
  Cosmos.drawNebula(cam);
  drawSpotlights(scene==='play'?G.t:(homeT||0));
  // far star layer (parallax)
  ctx.fillStyle='#aab8ff';
  for(const st of STARS){ const yy=(((st.y*H + cam*st.d)%H)+H)%H; ctx.globalAlpha=st.a; ctx.fillRect(st.x*W,yy,st.s,st.s); }
  // near twinkle layer — brighter, breathing, with a soft glow
  const tt2=(scene==='play'?G.t:(homeT||0));
  ctx.save(); ctx.fillStyle='#dfe7ff'; ctx.shadowColor='#bcd2ff'; ctx.shadowBlur=glowFX(6);
  for(const st of STARS2){ const yy=(((st.y*H + cam*st.d)%H)+H)%H;
    const tw=0.55+0.45*Math.sin(tt2*st.ts+st.tw); ctx.globalAlpha=st.a*tw;
    ctx.beginPath(); ctx.arc(st.x*W,yy,st.s*(0.6+tw*0.5),0,TAU); ctx.fill(); }
  ctx.restore();
  Cosmos.drawShooters();
  ctx.globalAlpha=1;
}


function nodeMeta(n,sk){
  switch(n.type){
    case 'bonus': return {c:'#ffd24a', glyph:'★'};
    case 'small': return {c:sk.t, glyph:''};
    case 'move': return {c:sk.c, glyph:'~'};
    case 'boost': return {c:'#ffd24a', glyph:'»'};
    case 'reverse': return {c:'#ff4d8d', glyph:'↺'};
    case 'slow': return {c:'#9ffff2', glyph:'◷'};
    case 'magnet': return {c:'#9be35a', glyph:'∩'};
    case 'cracked': return {c:'#ffd0d8', glyph:'✕'};
    default: return {c:world().node||sk.c, glyph:''};
  }
}

function drawNode(n){
  const x=n.wx, y=sY(n.wy), sk=skin();
  if(n.type==='spent') return;
  if(y<-60||y>H+60) return;
  if(n.type==='spike'){
    ctx.save(); ctx.translate(x,y); ctx.rotate(G.t*1.5);
    ctx.fillStyle='#ff3b5c'; ctx.shadowColor='#ff3b5c'; ctx.shadowBlur=glowFX(14);
    ctx.beginPath(); for(let i=0;i<8;i++){const a=i/8*TAU,rr2=i%2?n.r:n.r*0.5; ctx.lineTo(Math.cos(a)*rr2,Math.sin(a)*rr2);} ctx.closePath(); ctx.fill();
    ctx.rotate(-G.t*3); ctx.fillStyle='#ffd0d8'; ctx.shadowBlur=glowFX(8);
    ctx.beginPath(); ctx.arc(0,0,n.r*0.28,0,TAU); ctx.fill();
    ctx.restore(); return;
  }
  const bonus=n.type==='bonus';
  const active = G.player && G.player.latched && G.player.node===n;
  const meta=nodeMeta(n,sk);
  const col = meta.c;
  const pulse = Number.isFinite(n.pulse)?n.pulse:0;
  const baseR = Number.isFinite(n.r)?Math.max(1,n.r):18;
  const pr = baseR*(1+Math.sin(G.t*2+pulse)*0.06) * (active?1.06:1);
  if(!Number.isFinite(x)||!Number.isFinite(y)||!Number.isFinite(pr)||pr<=0) return;
  // soft outer halo — gives every node depth & presence
  if(FX!=='low'){ ctx.save(); ctx.globalCompositeOperation='lighter';
    const hg=ctx.createRadialGradient(x,y,pr*0.6,x,y,pr*2.4);
    hg.addColorStop(0, bonus?'rgba(255,210,74,0.28)': active?'rgba(255,255,255,0.22)':hexA(col,0.14));
    hg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=hg; ctx.beginPath(); ctx.arc(x,y,pr*2.4,0,TAU); ctx.fill(); ctx.restore(); }
  // bonus nodes get a rotating sparkle ring + orbiting dots — "treasure" telegraph
  if(bonus){ ctx.save(); ctx.translate(x,y); ctx.rotate(G.t*2);
    ctx.strokeStyle='#fff3b0'; ctx.globalAlpha=.7; ctx.lineWidth=2; ctx.setLineDash([4,8]);
    ctx.beginPath(); ctx.arc(0,0,n.r+9,0,TAU); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle='#fff7d6'; ctx.shadowColor='#ffd24a'; ctx.shadowBlur=glowFX(8); ctx.globalAlpha=1;
    for(let k=0;k<3;k++){ const a=k/3*TAU; ctx.beginPath(); ctx.arc(Math.cos(a)*(n.r+9),Math.sin(a)*(n.r+9),2.2,0,TAU); ctx.fill(); }
    ctx.restore(); }
  ctx.save(); ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=glowFX(bonus?24:active?22:18);
  ctx.beginPath(); ctx.arc(x,y,pr,0,TAU); ctx.fill();
  // rotating energy core arc — subtle "powered" feel
  if(!bonus && FX!=='low'){ ctx.strokeStyle='rgba(255,255,255,.45)'; ctx.lineWidth=1.5; ctx.globalAlpha=.5;
    ctx.beginPath(); ctx.arc(x,y,pr*0.55,G.t*2+pulse, G.t*2+pulse+Math.PI*1.3); ctx.stroke(); ctx.globalAlpha=1; }
  if(meta.glyph){ ctx.save(); ctx.font="800 13px 'Sora'"; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle='#07101d'; ctx.shadowBlur=0; ctx.fillText(meta.glyph,x,y+0.5); ctx.restore(); }
  ctx.fillStyle='rgba(255,255,255,.85)'; ctx.beginPath(); ctx.arc(x-pr*0.3,y-pr*0.3,pr*0.28,0,TAU); ctx.fill();
  ctx.restore();
}

function drawPlayer(){
  const pl=G.player, x=pl.wx, y=sY(pl.wy), sk=skin();
  const _pHi=perfectHi();
  const _perfectGlow = pl.latched && pl.charge>=PERFECT_LO && pl.charge<=_pHi;
  // ---- living aura: a soft halo that breathes and brightens with the combo ----
  if(FX!=='low' && !G.dead){
    const m=G.mult||1; const pulse=0.6+Math.sin(G.t*6)*0.4;
    const auraR=pl.r*(2.0+m*0.12)+Math.sin(G.t*3)*3;
    const ac0 = _perfectGlow ? '#ffffff' : sk.c;
    ctx.save(); ctx.globalCompositeOperation='lighter';
    const ag=ctx.createRadialGradient(x,y,pl.r*0.4,x,y,auraR);
    ag.addColorStop(0, hexA(ac0, 0.30+Math.min(m,9)*0.02)); ag.addColorStop(1,'rgba(0,0,0,0)');
    ctx.globalAlpha=0.6*pulse; ctx.fillStyle=ag; ctx.beginPath(); ctx.arc(x,y,auraR,0,TAU); ctx.fill();
    ctx.restore(); ctx.globalAlpha=1;
  }
  // ---- trail (per-skin style) — gives each unlock real visual identity ----
  if(!pl.latched && pl.trail.length>1){
    ctx.save(); ctx.lineCap='round';
    const tr=trail(); const style = tr.style || sk.trail || 'line'; const trailCol=tr.c||sk.c, trailTint=tr.t||sk.t;
    if(style==='line' || style==='comet'){
      // continuous tapered stroke; "comet" gets a thicker glowing head
      ctx.strokeStyle=trailCol; if(style==='comet'){ ctx.shadowColor=trailCol; ctx.shadowBlur=glowFX(10); }
      for(let i=1;i<pl.trail.length;i++){ const a=i/pl.trail.length;
        ctx.globalAlpha=a*(style==='comet'?0.7:0.5); ctx.lineWidth=a*pl.r*(style==='comet'?1.7:1.3);
        ctx.beginPath(); ctx.moveTo(pl.trail[i-1].x,sY(pl.trail[i-1].y)); ctx.lineTo(pl.trail[i].x,sY(pl.trail[i].y)); ctx.stroke(); }
    } else if(style==='dots'){
      // pulsing dot trail
      ctx.fillStyle=trailCol; ctx.shadowColor=trailCol; ctx.shadowBlur=glowFX(6);
      for(let i=0;i<pl.trail.length;i++){ const a=(i+1)/pl.trail.length;
        ctx.globalAlpha=a*0.7; const sz=a*pl.r*0.5+1;
        ctx.beginPath(); ctx.arc(pl.trail[i].x, sY(pl.trail[i].y), sz, 0, TAU); ctx.fill(); }
    } else if(style==='sparkle'){
      // twinkling 4-point stars at each trail point
      ctx.fillStyle=trailTint; ctx.shadowColor=trailTint; ctx.shadowBlur=glowFX(8);
      for(let i=0;i<pl.trail.length;i++){ const a=(i+1)/pl.trail.length;
        ctx.globalAlpha=a*0.8; const sz=a*5+1; const rot=G.t*4+i;
        const tx=pl.trail[i].x, ty=sY(pl.trail[i].y);
        ctx.save(); ctx.translate(tx,ty); ctx.rotate(rot);
        ctx.beginPath();
        for(let k=0;k<4;k++){ const ang=k/4*TAU; ctx.lineTo(Math.cos(ang)*sz,Math.sin(ang)*sz);
          ctx.lineTo(Math.cos(ang+Math.PI/4)*sz*0.35,Math.sin(ang+Math.PI/4)*sz*0.35); }
        ctx.closePath(); ctx.fill(); ctx.restore(); }
    } else if(style==='bubbles'){
      ctx.fillStyle=trailCol; ctx.shadowColor=trailCol; ctx.shadowBlur=glowFX(7);
      for(let i=0;i<pl.trail.length;i++){ const a=(i+1)/pl.trail.length; ctx.globalAlpha=a*0.55; ctx.beginPath(); ctx.arc(pl.trail[i].x, sY(pl.trail[i].y), 2+a*4, 0, TAU); ctx.strokeStyle=trailTint; ctx.lineWidth=1.2; ctx.stroke(); }
    } else if(style==='hearts' || style==='notes'){
      ctx.fillStyle=trailCol; ctx.shadowColor=trailCol; ctx.shadowBlur=glowFX(8); ctx.font="800 12px 'Sora'"; ctx.textAlign='center'; ctx.textBaseline='middle';
      for(let i=0;i<pl.trail.length;i+=2){ const a=(i+1)/pl.trail.length; ctx.globalAlpha=a*0.72; ctx.fillText(style==='hearts'?'♥':'♪', pl.trail[i].x, sY(pl.trail[i].y)); }
    } else if(style==='rainbow'){
      // hue-cycling line — Prism's signature
      for(let i=1;i<pl.trail.length;i++){ const a=i/pl.trail.length;
        ctx.strokeStyle=`hsl(${(G.t*120+i*18)%360},90%,65%)`;
        ctx.globalAlpha=a*0.6; ctx.lineWidth=a*pl.r*1.4;
        ctx.beginPath(); ctx.moveTo(pl.trail[i-1].x,sY(pl.trail[i-1].y)); ctx.lineTo(pl.trail[i].x,sY(pl.trail[i].y)); ctx.stroke(); }
    }
    ctx.restore(); ctx.globalAlpha=1;
  }
  const pHi=perfectHi();
  const inPerfect = pl.latched && pl.charge>=PERFECT_LO && pl.charge<=pHi;
  if(pl.latched){
    const n=pl.node, ch=pl.charge, pLo=PERFECT_LO, a0=-Math.PI/2, RR=15;
    const nx=n.wx, ny=sY(n.wy);
    // energy tether: glowing beam from node to star, with charges racing along it
    ctx.save(); const beamCol = inPerfect?'#ffffff':sk.c;
    ctx.strokeStyle=beamCol; ctx.globalAlpha=.5; ctx.lineWidth=inPerfect?3:2;
    ctx.shadowColor=beamCol; ctx.shadowBlur=glowFX(inPerfect?12:6);
    ctx.beginPath(); ctx.moveTo(nx,ny); ctx.lineTo(x,y); ctx.stroke();
    if(FX!=='low'){ ctx.shadowBlur=0; ctx.fillStyle=beamCol; ctx.globalAlpha=.85;
      for(let i=0;i<3;i++){ const tp=((G.t*1.5+i/3)%1); const bx=lerp(nx,x,tp), by=lerp(ny,y,tp);
        ctx.beginPath(); ctx.arc(bx,by,inPerfect?2.4:1.8,0,TAU); ctx.fill(); } }
    ctx.restore(); ctx.globalAlpha=1;
    // perfect-window telegraph — a soft pulsing ring that shouts: release NOW
    if(inPerfect && FX!=='low'){ const pr2=pl.r+10+Math.sin(G.t*16)*3;
      ctx.save(); ctx.strokeStyle='#ffffff'; ctx.globalAlpha=0.5+Math.sin(G.t*16)*0.3; ctx.lineWidth=2;
      ctx.shadowColor='#fff'; ctx.shadowBlur=glowFX(14);
      ctx.beginPath(); ctx.arc(x,y,pr2,0,TAU); ctx.stroke(); ctx.restore(); ctx.globalAlpha=1; }
    ctx.save(); ctx.translate(x,y);
    ctx.strokeStyle='rgba(255,255,255,.13)'; ctx.lineWidth=3; ctx.beginPath(); ctx.arc(0,0,RR,0,TAU); ctx.stroke();
    ctx.strokeStyle = inPerfect ? 'rgba(255,255,255,.95)' : 'rgba(159,255,242,.55)';
    ctx.lineWidth = inPerfect ? 5 : 4; if(inPerfect){ctx.shadowColor='#fff';ctx.shadowBlur=glowFX(12);}
    ctx.beginPath(); ctx.arc(0,0,RR, a0+pLo*TAU, a0+pHi*TAU); ctx.stroke(); ctx.shadowBlur=0;
    let col = inPerfect ? '#ffffff' : sk.t;
    ctx.strokeStyle=col; ctx.shadowColor=col; ctx.shadowBlur=glowFX(inPerfect?16:6); ctx.lineWidth=3.5;
    ctx.beginPath(); ctx.arc(0,0,RR, a0, a0+ch*TAU); ctx.stroke();
    const ma=a0+ch*TAU; ctx.fillStyle=col; ctx.shadowBlur=glowFX(8);
    ctx.beginPath(); ctx.arc(Math.cos(ma)*RR, Math.sin(ma)*RR, inPerfect?4:3, 0, TAU); ctx.fill();
    ctx.restore();
  }
  if(G.shield){ ctx.save(); ctx.strokeStyle='#9ffff2'; ctx.globalAlpha=.6+Math.sin(G.t*6)*.2; ctx.lineWidth=2.5;
    ctx.shadowColor='#9ffff2'; ctx.shadowBlur=glowFX(12); ctx.beginPath(); ctx.arc(x,y,pl.r+8,0,TAU); ctx.stroke(); ctx.restore(); }
  // combo flames: orbiting fire embers when on a hot streak (mult>=4)
  if(G.mult>=4 && !G.dead){ const flames=Math.min(8,G.mult); const fc = G.mult>=8?'#ff4d8d':G.mult>=6?'#ffb020':'#ffd24a';
    ctx.save(); ctx.globalCompositeOperation='lighter';
    for(let i=0;i<flames;i++){ const a=G.t*5 + i/flames*TAU; const rr3=pl.r+10+Math.sin(G.t*8+i)*3;
      ctx.globalAlpha=0.5; ctx.fillStyle=fc; ctx.shadowColor=fc; ctx.shadowBlur=glowFX(8);
      ctx.beginPath(); ctx.arc(x+Math.cos(a)*rr3, y+Math.sin(a)*rr3, 3, 0, TAU); ctx.fill(); }
    ctx.restore(); ctx.globalAlpha=1; }
  const closeness=clamp(1-(pl.wy-G.voidY)/240,0,1);
  const scared = closeness>0.4;
  if(G.invuln>0 && Math.sin(G.t*40)<0) { }
  else {
    if(pl.zap>0){ ctx.save(); ctx.translate(x,y); ctx.strokeStyle='#fff'; ctx.globalAlpha=clamp(pl.zap/0.25,0,1); ctx.lineWidth=2; ctx.shadowColor='#fff'; ctx.shadowBlur=glowFX(12);
      const z=lerp(pl.r+4,pl.r+16,1-pl.zap/0.25); for(let i=0;i<6;i++){const a=i/6*TAU+G.t; ctx.beginPath(); ctx.moveTo(Math.cos(a)*(pl.r+2),Math.sin(a)*(pl.r+2)); ctx.lineTo(Math.cos(a)*z,Math.sin(a)*z); ctx.stroke();} ctx.restore(); }
    const sp=pl.latched?0:Math.hypot(pl.vx,pl.vy);
    const stretch=clamp(sp/1400,0,.5);
    let bodyCol=sk.c, glow=inPerfect?28:18;
    const scale = inPerfect?1.08:1;
    // ---- star-creature: 4 orbiting sparkle points around the body (cosmic identity) ----
    if(FX!=='low'){
      ctx.save(); ctx.translate(x,y);
      const sparkRot=G.t*1.4*(pl.latched?1:0.4);
      const sparkR=pl.r+5+Math.sin(G.t*4)*1.2;
      ctx.fillStyle=sk.t; ctx.shadowColor=sk.t; ctx.shadowBlur=glowFX(6);
      for(let k=0;k<4;k++){ const a=sparkRot+k/4*TAU;
        const tw=0.6+0.4*Math.sin(G.t*6+k*1.5);   // twinkle alpha
        ctx.globalAlpha=tw;
        const px=Math.cos(a)*sparkR, py=Math.sin(a)*sparkR;
        ctx.beginPath(); ctx.arc(px,py,1.6+tw*0.6,0,TAU); ctx.fill();
      }
      ctx.restore(); ctx.globalAlpha=1;
    }
    // body w/ squash-stretch along travel direction
    ctx.save(); ctx.translate(x,y); ctx.rotate(pl.face);
    ctx.fillStyle=bodyCol; ctx.shadowColor=bodyCol; ctx.shadowBlur=glowFX(glow);
    ctx.beginPath(); ctx.ellipse(0,0,pl.r*scale*(1+stretch),pl.r*scale*(1-stretch*0.6),0,0,TAU); ctx.fill();
    drawCreatureFeatures(sk, pl.r*scale, stretch, inPerfect, scared);
    // eyes (look forward; widen when scared, brighter when perfect)
    ctx.rotate(-pl.face);
    const ex=Math.cos(pl.face), ey=Math.sin(pl.face);
    const eyeR = scared?3.3 : inPerfect?3.0 : 2.6;
    const pupil = scared?1.0 : 1.3;
    for(const o of [-1,1]){
      const px=ey*o*3.2, py=-ex*o*3.2;
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(px+ex*2,py+ey*2,eyeR,0,TAU); ctx.fill();
      ctx.fillStyle='#0a0720'; ctx.beginPath(); ctx.arc(px+ex*3.2,py+ey*3.2,pupil,0,TAU); ctx.fill();
    }
    ctx.restore();
  }
}

function drawTrajectory(){
  if(!aim||!G.player.latched) return;
  const pl=G.player, sk=skin();
  const tx=-Math.sin(pl.ang)*pl.dir, ty=Math.cos(pl.ang)*pl.dir;
  let x=pl.wx,y=pl.wy,vx=tx*LAUNCH,vy=ty*LAUNCH; const dt=1/60, pad=curCatchPad();
  const steps=Math.round(lerp(70,48,clamp(G.height/600,0,1)));
  ctx.save(); ctx.fillStyle=sk.c;
  for(let i=0;i<steps;i++){
    vy-=G_FALL*dt; x+=vx*dt; y+=vy*dt;
    if(x<pl.r){x=pl.r;vx=Math.abs(vx)*WALL_BOUNCE;} if(x>W-pl.r){x=W-pl.r;vx=-Math.abs(vx)*WALL_BOUNCE;}
    let hitN=false;
    for(const n of G.nodes){
      if(n.type==='spike'||n.type==='spent') continue;
      if(n===pl.node) continue;
      if(n===pl.lastReleased) continue;
      if(Math.hypot(x-n.wx,y-n.wy)<n.r+pl.r+pad){ hitN=true; break; }
    }
    if(i%3===0){ ctx.globalAlpha=clamp(1-i/steps,0,.6); ctx.beginPath(); ctx.arc(x,sY(y),2.2,0,TAU); ctx.fill(); }
    if((hitN && i>3) || y<G.voidY) break;
  }
  ctx.restore();
}

function drawVoid(){
  const vy=sY(G.voidY), vc=(world().void||'#ff3b5c');
  if(vy<H+40){
    const g=ctx.createLinearGradient(0,vy-50,0,H);
    g.addColorStop(0,hexA(vc,0)); g.addColorStop(.4,hexA(vc,.25)); g.addColorStop(1,hexA(vc,.9));
    ctx.fillStyle=g; ctx.fillRect(0,vy-50,W,H-(vy-50)+50);
    ctx.strokeStyle=vc; ctx.lineWidth=3; ctx.shadowColor=vc; ctx.shadowBlur=glowFX(18);
    ctx.beginPath(); ctx.moveTo(0,vy); ctx.lineTo(W,vy); ctx.stroke(); ctx.shadowBlur=0;
  }
}

/* casino marquee bulbs running around a rounded rect */
function drawMarquee(x,y,w,h,r,t,col){
  const per=2*(w+h-2*r) - 2*Math.PI*r + 2*Math.PI*r; // approx perimeter
  const P2=2*((w-2*r)+(h-2*r)) + TAU*r;
  const n=Math.max(14, Math.round(P2/22));
  ctx.save();
  for(let i=0;i<n;i++){
    const d=((i/n)+t*0.12)%1; const pt=marqueePoint(x,y,w,h,r,d);
    const on=Math.sin(t*8 + i*0.9)>0;
    ctx.globalAlpha=on?1:0.25; ctx.fillStyle=on?'#fff7c0':col; ctx.shadowColor=col; ctx.shadowBlur=glowFX(on?10:3);
    ctx.beginPath(); ctx.arc(pt.x,pt.y,on?2.6:2,0,TAU); ctx.fill();
  }
  ctx.restore(); ctx.globalAlpha=1;
}
function marqueePoint(x,y,w,h,r,d){
  // walk the rounded-rect perimeter param d in [0,1)
  const sw=w-2*r, sh=h-2*r, arc=TAU*r/4;
  const L=[sw,arc,sh,arc,sw,arc,sh,arc]; const tot=L.reduce((a,b)=>a+b,0);
  let dist=d*tot, seg=0; while(dist>L[seg]){ dist-=L[seg]; seg++; }
  const cx=x, cy=y;
  switch(seg){
    case 0: return {x:cx+r+dist, y:cy};
    case 1: { const a=-Math.PI/2+dist/arc*(Math.PI/2); return {x:cx+w-r+Math.cos(a)*r, y:cy+r+Math.sin(a)*r}; }
    case 2: return {x:cx+w, y:cy+r+dist};
    case 3: { const a=0+dist/arc*(Math.PI/2); return {x:cx+w-r+Math.cos(a)*r, y:cy+h-r+Math.sin(a)*r}; }
    case 4: return {x:cx+w-r-dist, y:cy+h};
    case 5: { const a=Math.PI/2+dist/arc*(Math.PI/2); return {x:cx+r+Math.cos(a)*r, y:cy+h-r+Math.sin(a)*r}; }
    case 6: return {x:cx, y:cy+h-r-dist};
    default:{ const a=Math.PI+dist/arc*(Math.PI/2); return {x:cx+r+Math.cos(a)*r, y:cy+r+Math.sin(a)*r}; }
  }
}

function drawIconBtn(x,y,s,icon,col){
  ctx.save(); rr(x,y,s,s,10); ctx.fillStyle='rgba(20,16,48,.7)'; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.08)'; ctx.lineWidth=1; ctx.stroke();
  ctx.strokeStyle=col; ctx.fillStyle=col; ctx.lineWidth=2; ctx.lineCap='round';
  const cx=x+s/2, cy=y+s/2;
  if(icon==='sound'){ ctx.beginPath(); ctx.moveTo(cx-7,cy-3); ctx.lineTo(cx-3,cy-3); ctx.lineTo(cx+1,cy-7); ctx.lineTo(cx+1,cy+7); ctx.lineTo(cx-3,cy+3); ctx.lineTo(cx-7,cy+3); ctx.closePath(); ctx.fill(); ctx.beginPath(); ctx.arc(cx+3,cy,4,-.6,.6); ctx.stroke(); }
  else if(icon==='mute'){ ctx.beginPath(); ctx.moveTo(cx-7,cy-3); ctx.lineTo(cx-3,cy-3); ctx.lineTo(cx+1,cy-7); ctx.lineTo(cx+1,cy+7); ctx.lineTo(cx-3,cy+3); ctx.lineTo(cx-7,cy+3); ctx.closePath(); ctx.fill(); ctx.beginPath(); ctx.moveTo(cx+3,cy-4); ctx.lineTo(cx+9,cy+4); ctx.moveTo(cx+9,cy-4); ctx.lineTo(cx+3,cy+4); ctx.stroke(); }
  else if(icon==='music'){ ctx.beginPath(); ctx.moveTo(cx-5,cy+7); ctx.lineTo(cx-5,cy-7); ctx.lineTo(cx+7,cy-10); ctx.lineTo(cx+7,cy+3); ctx.stroke(); ctx.beginPath(); ctx.arc(cx-8,cy+7,3.2,0,TAU); ctx.fill(); ctx.beginPath(); ctx.arc(cx+4,cy+3,3.2,0,TAU); ctx.fill(); }
  else if(icon==='aim'){ ctx.beginPath(); ctx.arc(cx,cy,6,0,TAU); ctx.stroke(); ctx.beginPath(); ctx.moveTo(cx,cy-9); ctx.lineTo(cx,cy-3); ctx.moveTo(cx,cy+3); ctx.lineTo(cx,cy+9); ctx.moveTo(cx-9,cy); ctx.lineTo(cx-3,cy); ctx.moveTo(cx+3,cy); ctx.lineTo(cx+9,cy); ctx.stroke(); }
  else if(icon==='fx'){
    // 3 sparkle dots whose count = intensity; "FX" letter overlay shows currently locked level
    const lvl = FX_USER==='auto'?-1 : (FX_USER==='high'?3 : FX_USER==='medium'?2 : 1);

    }
    ctx.globalAlpha=1;
    ctx.font="700 7px 'Sora'"; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(FX_USER==='auto'?'AUTO':FX_USER.toUpperCase().slice(0,3), cx, cy+8);
  }
  ctx.restore();
}

const Result={
  show(d){ this.d=d; this.t=0; this.tallied=false; this.dispCoins=0; this.skipped=false;
    this.doubled=false; this.busyAd=false; const lp=Profile.levelProgress();
    this.bars=[
      {label:'LEVEL '+lp.l+' — '+Profile.title(), to:lp.cur/lp.need, color:'#2ff3e0', val:'+'+d.xpGain+' XP'},
      {label:'DAILY MISSION', to:Daily.pct(), color:Daily.d.done?'#9be35a':'#ffb020', val:Daily.d.done?'COMPLETE ✓':(Math.min(Daily.d.prog,Daily.g.t)+'/'+Daily.g.t)},
      {label:this.nextSkinLabel(), to:this.nextSkinPct(), color:'#ff4d8d', val:'★ +'+d.coins},
    ];
    if(d.daily){ const nm=DailyRun.nextMedal(), tm=DailyRun.topMedal();
      this.bars[1]={label:nm?('DAILY · NEXT '+nm.name+' '+nm.th+'m'):'DAILY · ALL MEDALS', to:nm?clamp(d.h/nm.th,0,1):1, color:'#ffd24a', val:tm?tm.name:'—'}; }
    this.anim=this.bars.map(()=>0);
    if(d.newBest && FX!=='low'){ Confetti.rain(pcount(40)); }
    if(d.dailyMedals && d.dailyMedals.length){ Confetti.rain(pcount(50)); setTimeout(()=>{ SFX.jackpot(); cymbal(0.4); vib([30,50,30]); }, 500); }
    if(d.achievements && d.achievements.length){ setTimeout(()=>{ SFX.unlock(); cymbal(0.3); vib([30,50,30]); }, 600); }
    if(d.potWon){ Confetti.rain(pcount(60)); cymbal(0.6); }
  },
  /* rewarded DOUBLE COINS — pure upside, only on the result screen, opt-in. */
  doubleCoins(){ if(this.doubled||this.busyAd||!this.d||this.d.coins<=0) return; this.busyAd=true;
    const add=this.d.coins;
    CGSDK.rewarded(()=>{ this.busyAd=false; this.doubled=true; Profile.addCoins(add);
      this.d.coins=add*2; this.dispCoins=add*2; this.tallied=true;
      SFX.chaching(); cymbal(0.4); cheerSwell(.5,.14); Confetti.rain(pcount(44)); vib([20,40,20]);
      const b=bankXY(); FlyCoins.send(W/2,H*0.5,12,b.x,b.y);
    }, ()=>{ this.busyAd=false; }); },
  nextSkin(){ return SKINS.find(s=>!Owned.includes(s.id)); },
  nextSkinLabel(){ const s=this.nextSkin(); return s?('NEXT SKIN: '+s.name):'ALL SKINS UNLOCKED'; },
  nextSkinPct(){ const s=this.nextSkin(); return s?clamp(Profile.coins/s.price,0,1):1; },
  header(){ const d=this.d;
    if(d.daily){ if(d.dailyMedals && d.dailyMedals.length) return [d.dailyMedals[d.dailyMedals.length-1].name+' MEDAL!','#ffd24a'];
      if(d.newBest) return ['NEW DAILY BEST','#9be35a']; return ['DAILY RUN','#ffd24a']; }
    if(d.newBest) return ['NEW BEST!','#9be35a'];
    if(Profile.best>0 && d.h>=Profile.best*0.9) return ['SO CLOSE!','#ffb020'];
    if(d.mc>=8) return ['STELLAR RUN','#ff4d8d'];
    return ['RUN COMPLETE','#9fb0e0']; },
  nextAction(){ const d=this.d;
    if(d.daily){ const nm=DailyRun.nextMedal(); if(nm) return `Reach ${nm.th} m for the ${nm.name} medal`; return `All daily medals earned — back tomorrow!`; }
    if(!Daily.d.done){ const g=Daily.g, left=g.t-Math.min(Daily.d.prog,g.t);
      if(g.kind==='cum') return `${left} to go for the daily mission`;
      return `Reach ${g.t}${g.id==='combo'?' in combo':' m'} for the daily mission`; }
    const nm=MILESTONES.find(m=>m>d.h); if(nm && d.h>=nm*0.7) return `Just ${nm-d.h} m to the ${nm} m milestone`;
    const ns=this.nextSkin(); if(ns){ const left=Math.max(0,ns.price-Profile.coins); if(left>0) return `Save ${left} ★ to unlock ${ns.name}`; return `You can afford ${ns.name} — check the collection`; }
    return `Beat your best: ${Profile.best} m`; },
  upd(dt){ this.t+=dt;
    for(let i=0;i<this.bars.length;i++){ if(this.t>0.3+i*0.45) this.anim[i]=lerp(this.anim[i],this.bars[i].to,Math.min(1,dt*5)); }
    // coin tally rolls up with ka-ching ticks; faster lerp if user tapped-to-skip
    if(this.d){ const target=this.d.coins; const sp=this.skipped?12:4;
      if(this.dispCoins<target-0.5){ this.dispCoins=lerp(this.dispCoins,target,Math.min(1,dt*sp)); SFX.tick(); }
      else if(!this.tallied){ this.dispCoins=target; this.tallied=true; if(target>0){ SFX.chaching(); cymbal(0.3); } } }
  },
  skip(){ this.skipped=true; },
  render(){ const d=this.d, hd=this.header();
    dimVoid(0.82);
    Coins.draw(); Confetti.draw();
    text(hd[0], W/2, H*0.13, 30, hd[1], 800, 18, 'center', "'Unbounded'");
    text(d.h+' m', W/2, H*0.21, 46, '#fff', 800, 16, 'center', "'Unbounded'");
    const sy=H*0.28;
    this.stat('BEST', Profile.best+' m', W*0.27, sy);
    this.stat('COMBO', 'x'+d.mc, W*0.5, sy);
    this.stat('PERFECT', String(d.perf), W*0.73, sy);
    let by=H*0.36;
    for(let i=0;i<this.bars.length;i++){ const b=this.bars[i];
      ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.font="600 12px 'Sora'"; ctx.fillStyle='#c5cef0'; ctx.fillText(b.label, W*0.12, by);
      ctx.textAlign='right'; ctx.fillStyle=b.color; ctx.fillText(b.val, W*0.88, by);
      rr(W*0.12, by+12, W*0.76, 9, 4); ctx.fillStyle='rgba(255,255,255,.08)'; ctx.fill();
      rr(W*0.12, by+12, W*0.76*clamp(this.anim[i],0,1), 9, 4); ctx.fillStyle=b.color; ctx.shadowColor=b.color; ctx.shadowBlur=8; ctx.fill(); ctx.shadowBlur=0;
      by+=46; }
    // animated coin tally
    text('★ '+Math.round(this.dispCoins||0)+' COLLECTED', W/2, by-4, 16, '#ffd24a', 800, 8, 'center', "'Unbounded'");
    // invisible tap target on the tally area lets impatient players skip the rollup
    btn('skip', W*0.2, by-20, W*0.6, 30, ()=>{ this.skip(); });
    by+=22;
    // DOUBLE COINS (rewarded) — pure-upside opt-in, right after the tally
    if(d.coins>0){
      const dw=W*0.62, dh=32, dx=W/2-dw/2, dy=by;
      if(this.doubled){
        rr(dx,dy,dw,dh,9); ctx.fillStyle='rgba(155,227,90,.14)'; ctx.fill();
        ctx.strokeStyle='#9be35a'; ctx.lineWidth=1.5; ctx.stroke();
        text('★ COINS DOUBLED ✓', W/2, dy+dh/2, 13, '#9be35a', 800, 4);
      } else {
        const gp=0.7+Math.sin(this.t*5)*0.3;
        rr(dx,dy,dw,dh,9); ctx.fillStyle='rgba(255,210,74,.16)'; ctx.fill();
        ctx.strokeStyle='#ffd24a'; ctx.shadowColor='#ffd24a'; ctx.shadowBlur=glowFX(8*gp); ctx.lineWidth=1.6; ctx.stroke(); ctx.shadowBlur=0;
        text(this.busyAd?'LOADING…':'★ DOUBLE COINS  ▶', W/2, dy+dh/2, 13, '#ffd24a', 800, 5);
        if(!this.busyAd) btn('double', dx,dy,dw,dh, ()=>this.doubleCoins());
      }
      by+=dh+10;
    }
    if(d.leveledUp) text('LEVEL UP!', W/2, by+4, 16, '#2ff3e0', 800, 10);
    if(d.dailyJustDone) text('MISSION COMPLETE  ★+'+Daily.g.reward, W/2, by+(d.leveledUp?26:4), 14, '#9be35a', 700, 8);
    // achievement cards — only what they actually just unlocked
    if(d.achievements && d.achievements.length){

    text(this.nextAction(), W/2, H*0.715, 14, '#9fb0e0', 600, 0);

    const pw=W*0.62, ph=58, px=W/2-pw/2, py=H*0.77, sk=skin();

    drawMarquee(px,py,pw,ph,14,this.t,'#fff');
    text(d.daily?'DAILY AGAIN':'PLAY AGAIN', W/2, py+ph/2, 20, '#04030a', 800, 0, 'center', "'Unbounded'");
    btn('replay', px,py,pw,ph, ()=>requestPlay(d.daily));
    const half=(pw-12)/2;
    rr(px,py+ph+12,half,46,12); ctx.fillStyle='rgba(20,16,48,.7)'; ctx.fill(); ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=1.5; ctx.stroke();
    text('COLLECTION', px+half/2, py+ph+12+23, 13, sk.t, 700, 0); btn('rshop', px,py+ph+12,half,46, ()=>{ scene='shop'; });
    rr(px+half+12,py+ph+12,half,46,12); ctx.fillStyle='rgba(20,16,48,.7)'; ctx.fill(); ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=1.5; ctx.stroke();
    text('MENU', px+half+12+half/2, py+ph+12+23, 13, '#9fb0e0', 700, 0); btn('rmenu', px+half+12,py+ph+12,half,46, ()=>{ scene='home'; }); },
  stat(label,val,x,y){ text(val, x, y, 22, '#fff', 800, 0); text(label, x, y+22, 11, '#7e88b5', 600, 0); }

  rr(bx,by,bw,bh,12); ctx.fillStyle=sk.c; ctx.shadowColor=sk.c; ctx.shadowBlur=16; ctx.fill(); ctx.shadowBlur=0;

function startPlay(daily){
  const bonus=Streak.touchToday();
  resetRun(daily); scene='play'; CGSDK.gameplayStart();
  if(G.daily){ Callout.add('DAILY CHALLENGE','#ffd24a',false); }
  if(bonus>0){ Callout.add('DAY '+Streak.count+' STREAK  +'+bonus+' ★','#9be35a',false); SFX.unlock(); vib(20); }
}
/* play with a possible between-run interstitial — never before the player's
   first couple of runs, and platform frequency-caps on top of this. */
function requestPlay(daily){
  if(CGSDK.sdk && totalRuns>=2 && runsSinceAd>=2){ runsSinceAd=0; CGSDK.midgame(()=>startPlay(daily)); }
  else startPlay(daily);
}

let inputLock=false;
function pos(e){ const r=cv.getBoundingClientRect(); return {x:e.clientX-r.left, y:e.clientY-r.top}; }
function primaryAction(){
  if(scene==='play'){ if(!G.dead) release(); }
  else if(scene==='over'){ requestPlay(); }
  else if(scene==='home'){ requestPlay(); }
  else if(scene==='shop'){ scene='home'; }
  // 'revive' is button-only (auto-resolves on its countdown)
}
function onDown(e){
  ac(); e.preventDefault();
  if(inputLock) return; inputLock=true; setTimeout(()=>inputLock=false,40);
  const {x,y}=pos(e);
  if(scene!=='play'){ hitButtons(x,y); return; }
  if(!G.dead) release();
}
cv.addEventListener('pointerdown', onDown, {passive:false});
cv.addEventListener('pointercancel', ()=>{ inputLock=false; }, {passive:false});
cv.addEventListener('contextmenu', e=>e.preventDefault());
window.addEventListener('keydown', e=>{
  if(e.code==='Space'||e.code==='Enter'||e.code==='ArrowUp'){
    e.preventDefault(); ac();
    if(inputLock) return; inputLock=true; setTimeout(()=>inputLock=false,40);
    primaryAction();
  }
}, {passive:false});

/* =========================================================================
   LOOP
   ========================================================================= */
const FIXED=1/60, MAX_STEPS=5;
let last=0, loopStarted=false, paused=false, acc=0, fpsT=0, fpsN=0, fps=0, fxCheckT=0;
function frame(now){
  requestAnimationFrame(frame);
  if(paused){ last=now; return; }
  let dt=(now-last)/1000; last=now; if(dt>0.25) dt=0.25; if(dt<0) dt=0;

  buttons=[];
  if(scene==='play'){
    acc+=dt; let steps=0;
    while(acc>=FIXED && steps<MAX_STEPS){ update(FIXED); acc-=FIXED; steps++; }
    if(steps>=MAX_STEPS) acc=0;
  } else { acc=0; if(scene==='over') Result.upd(dt); else if(scene==='revive') ReviveOffer.upd(dt); }
  P.upd(dt); Pop.upd(dt);
  Coins.upd(dt); Confetti.upd(dt); Rays.upd(dt); Callout.upd(dt); Flash.upd(dt);
  Shock.upd(dt); Sparkles.upd(dt); FlyCoins.upd(dt); Cosmos.upd(dt);
  Beat.step(dt); MusicBed.step(dt);
  updRollers(dt);
  if(shakeT>0){ shakeT-=dt; if(shakeT<=0) shakeMag=0; }

  ctx.clearRect(0,0,W,H);
  ctx.save(); if(shakeMag>0){ const s=shakeMag; ctx.translate(rand(-s,s),rand(-s,s)); }
  if(scene==='home') renderHome(dt);
  else if(scene==='play'){ renderPlay(); }
  else if(scene==='over'){ renderPlay(); Result.render(); }
  else if(scene==='revive'){ renderPlay(); ReviveOffer.render(); }
  else if(scene==='shop') renderShop();
  ctx.restore();

  fpsT+=dt; fpsN++;
  if(fpsT>=1){ fps=Math.round(fpsN/fpsT); fpsT=0; fpsN=0; fxCheckT+=1;
    if(fxCheckT>=2 && FX_USER==='auto'){ if(FX==='high'&&fps<46) FX='medium'; else if(FX==='medium'&&fps<36) FX='low'; }
  }
  if(DEBUG){ text('fps '+fps+'  fx '+FX+'  p '+P.a.length+'  c '+Coins.a.length, 8, H-12, 11, '#5b6488', 600, 0, 'left'); }
}
function startLoop(){ if(loopStarted) return; loopStarted=true; last=performance.now();
  requestAnimationFrame(frame); }

document.addEventListener('visibilitychange', ()=>{ paused=document.hidden; if(!paused){ last=performance.now(); acc=0; } });

CGSDK.init();
window.addEventListener('load', ()=>{ resize(); startLoop(); });
resize(); startLoop();
</script>
</body>

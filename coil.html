<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>COIL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;800&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  #sat{ position:fixed; top:0; left:0; width:0; height:env(safe-area-inset-top, 0px); pointer-events:none; visibility:hidden; }

  html,body{height:100%;background:#04030a;overflow:hidden;overscroll-behavior:none;font-family:'Sora',sans-serif;color:#eaf6ff;position:fixed;inset:0;width:100%;}
  body{display:flex;align-items:center;justify-content:center;touch-action:none;}
  #frame{position:relative;width:100%;max-width:540px;height:100%;height:100dvh;overflow:hidden;
    background:radial-gradient(130% 90% at 50% 0%, #160e33 0%, #0a0720 45%, #04030a 100%);
    box-shadow:0 0 0 1px #1a1535, 0 30px 90px rgba(0,0,0,.6);}
  canvas{display:block;width:100%;height:100%;touch-action:none;}
  #frame::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:9;
    background:radial-gradient(120% 100% at 50% 50%, rgba(0,0,0,0) 60%, rgba(0,0,0,.5) 100%);}

<body>
<div id="sat"></div>
<div id="frame"><canvas id="cv"></canvas></div>
<script>
"use strict";
/* =========================================================================
   COIL — Hybrid
   Auto-orbit · tap to fling on the tangent · fly through the glowing gate.
   Survival = one readable variable: WHEN to tap. Release speed is constant,
   there is no punishment for imperfect timing. The "perfect" gate is a pure
   REWARD layer (combo + coins + juice). Easy to survive, deep to master.
   ========================================================================= */
const DEBUG=false;
let SAFE_TOP=8;

/* ---------- storage ---------- */
const _mem={};
const Store={
  get(k,d){try{const v=localStorage.getItem(k);return v==null?d:JSON.parse(v);}catch(e){return (k in _mem)?_mem[k]:d;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){_mem[k]=v;}}
};

/* ---------- canvas ---------- */
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function resize(){
  DPR=Math.min(window.devicePixelRatio||1,2);
  const r=cv.getBoundingClientRect(); W=Math.round(r.width)||360; H=Math.round(r.height)||640;
  cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  let inset=0; const sat=document.getElementById('sat'); if(sat){ inset=sat.getBoundingClientRect().height||0; }
  SAFE_TOP=Math.round(inset)+6;
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,80));

/* ---------- haptics ---------- */
function buzz(ms){ try{ if(navigator.vibrate && !muted) navigator.vibrate(ms); }catch(e){} }

/* ---------- audio ---------- */
let AC=null, muted=Store.get('coil_muted',false);
function ac(){ if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}} if(AC&&AC.state==='suspended'){try{AC.resume();}catch(e){}} return AC; }
function tone(f,d=.08,type='sine',vol=.16,slide=0){
  if(muted) return; const a=ac(); if(!a) return; const t=a.currentTime;
  const o=a.createOscillator(),g=a.createGain(); o.type=type; o.frequency.setValueAtTime(f,t);
  if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(40,f+slide),t+d);
  g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.0001,t+d);
  o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+d+.02);
}
function noise(d=.18,vol=.22,lp=1600){
  if(muted) return; const a=ac(); if(!a) return; const n=Math.floor(a.sampleRate*d);
  const b=a.createBuffer(1,n,a.sampleRate),dd=b.getChannelData(0);
  for(let i=0;i<n;i++) dd[i]=(Math.random()*2-1)*(1-i/n);
  const s=a.createBufferSource(); s.buffer=b; const g=a.createGain(); g.gain.value=vol;
  const f=a.createBiquadFilter(); f.type='lowpass'; f.frequency.value=lp;
  s.connect(f); f.connect(g); g.connect(a.destination); s.start();
}
const SFX_LAST={};
function thr(n,ms){ const t=performance.now(); if(SFX_LAST[n]&&t-SFX_LAST[n]<ms) return false; SFX_LAST[n]=t; return true; }
const SFX={
  fling(){ if(!thr('fling',40))return; noise(.10,.08,1400); tone(300,.10,'sawtooth',.07,180); },
  catch(c){ if(!thr('catch',40))return; tone(440+Math.min(c,12)*40,.08,'triangle',.14,90); },
  perfect(c){ if(!thr('perfect',50))return; tone(720+Math.min(c,12)*55,.10,'triangle',.18,240); setTimeout(()=>tone(1180,.09,'sine',.13),50); },
  coin(){ if(!thr('coin',35))return; tone(900,.05,'square',.10,200); },
  bonus(){ [784,988,1318].forEach((f,i)=>setTimeout(()=>tone(f,.12,'triangle',.16),i*55)); },
  shield(){ tone(300,.2,'sine',.16,500); },
  milestone(){ [659,880,1175].forEach((f,i)=>setTimeout(()=>tone(f,.15,'triangle',.17),i*65)); },
  unlock(){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>tone(f,.14,'triangle',.16),i*80)); },
  death(){ noise(.35,.3,1200); tone(120,.35,'sawtooth',.22,-70); },
  click(){ tone(520,.05,'square',.1,90); }
};

/* ---------- helpers ---------- */
const clamp=(v,a,b)=>v<a?a:v>b?b:v, lerp=(a,b,t)=>a+(b-a)*t, rand=(a,b)=>a+Math.random()*(b-a);
const TAU=Math.PI*2;
function angDiff(a,b){ let d=(a-b)%TAU; if(d>Math.PI)d-=TAU; if(d<-Math.PI)d+=TAU; return Math.abs(d); }
let FX=((window.devicePixelRatio||1)<1.5 && Math.min(window.screen?screen.width:999,window.screen?screen.height:999)<=380)?'medium':'high';
function glowFX(v){ return FX==='low'?Math.min(v,3):FX==='medium'?v*0.55:v; }
function pcount(n){ return FX==='low'?Math.ceil(n*0.4):FX==='medium'?Math.ceil(n*0.7):n; }
function distPointToSegment(px,py,ax,ay,bx,by){
  const abx=bx-ax,aby=by-ay,apx=px-ax,apy=py-ay,ab2=abx*abx+aby*aby;
  const t=ab2>0?clamp((apx*abx+apy*aby)/ab2,0,1):0; const cx=ax+abx*t,cy=ay+aby*t; return Math.hypot(px-cx,py-cy);
}
function rr(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function text(t,x,y,size,color,weight=700,glow=0,align='center',font="'Sora'"){
  ctx.save(); ctx.font=`${weight} ${size}px ${font}, sans-serif`; ctx.textAlign=align; ctx.textBaseline='middle';
  if(glow){ctx.shadowColor=color;ctx.shadowBlur=glowFX(glow);} ctx.fillStyle=color; ctx.fillText(t,x,y);
  if(glow)ctx.fillText(t,x,y); ctx.restore();
}

/* ---------- shake + particles + pops ---------- */
let shakeT=0,shakeMag=0; function shake(m,t=.25){shakeMag=Math.max(shakeMag,m);shakeT=Math.max(shakeT,t);}
const PCAP=240;
const P={a:[],burst(x,y,n,c,sp=220,life=.5,sz=4){n=pcount(n);for(let i=0;i<n;i++){const an=Math.random()*TAU,s=rand(sp*.3,sp);
    this.a.push({x,y,vx:Math.cos(an)*s,vy:Math.sin(an)*s,life,max:life,c,sz:rand(sz*.5,sz)});}
    if(this.a.length>PCAP) this.a.splice(0,this.a.length-PCAP);},
  ring(x,y,c,n=18,sp=260){n=pcount(n);for(let i=0;i<n;i++){const an=i/n*TAU;this.a.push({x,y,vx:Math.cos(an)*sp,vy:Math.sin(an)*sp,life:.5,max:.5,c,sz:3});}
    if(this.a.length>PCAP) this.a.splice(0,this.a.length-PCAP);},
  upd(dt){for(let i=this.a.length-1;i>=0;i--){const p=this.a[i];p.life-=dt;if(p.life<=0){this.a[i]=this.a[this.a.length-1];this.a.pop();continue;}p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.96;p.vy*=.96;}},
  draw(){for(const p of this.a){const al=clamp(p.life/p.max,0,1);ctx.globalAlpha=al;ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*al,0,TAU);ctx.fill();}ctx.globalAlpha=1;},
  clear(){this.a.length=0;}};
const Pop={a:[],add(x,y,t,c){this.a.push({x,y,t,c,life:1});},
  upd(dt){for(let i=this.a.length-1;i>=0;i--){const p=this.a[i];p.life-=dt*1.2;p.y-=30*dt;if(p.life<=0){this.a[i]=this.a[this.a.length-1];this.a.pop();}}},
  draw(){for(const p of this.a){ctx.globalAlpha=clamp(p.life,0,1);text(p.t,p.x,p.y,16,p.c,700,8);}ctx.globalAlpha=1;},
  clear(){this.a.length=0;}};

/* ---------- profile / economy ---------- */
const TITLES=['Rookie','Operator','Specialist','Commander','Veteran','Elite','Mythic','Legend'];
function xpForLevel(l){ return Math.round(60*Math.pow(l,1.35)); }
const Profile={
  xp:Store.get('coil_xp',0), coins:Store.get('coil_coins',0), best:Store.get('coil_best',0),
  level(){ let l=1,x=this.xp; while(x>=xpForLevel(l)){x-=xpForLevel(l);l++;} return l; },
  levelProgress(){ let l=1,x=this.xp; while(x>=xpForLevel(l)){x-=xpForLevel(l);l++;} return {l,cur:x,need:xpForLevel(l)}; },
  title(){ return TITLES[Math.min(TITLES.length-1,Math.floor((this.level()-1)/4))]; },
  addXP(n){ this.xp+=n; Store.set('coil_xp',this.xp); },
  addCoins(n){ this.coins+=n; Store.set('coil_coins',this.coins); },
  setBest(h){ if(h>this.best){this.best=h;Store.set('coil_best',h);return true;} return false; }
};

/* ---------- skins (cosmetic only — never pay-to-win) ---------- */
const SKINS=[
  {id:'cyan',  name:'Pulse', price:0,    c:'#2ff3e0', t:'#9ffff2'},
  {id:'amber', name:'Ember', price:250,  c:'#ffb020', t:'#ffe39b'},
  {id:'pink',  name:'Neon',  price:550,  c:'#ff4d8d', t:'#ffb0cd'},
  {id:'lime',  name:'Acid',  price:900,  c:'#9be35a', t:'#dcffb0'},
  {id:'violet',name:'Void',  price:1500, c:'#a76bff', t:'#dcc6ff'},
  {id:'white', name:'Prism', price:2600, c:'#ffffff', t:'#cfe9ff'},
];
const Owned=Store.get('coil_skins',['cyan']);
let equipped=Store.get('coil_skin','cyan');
function skin(){ return SKINS.find(s=>s.id===equipped)||SKINS[0]; }

/* ---------- daily mission ---------- */
const GOALS=[
  {id:'height',t:300,kind:'runmax',text:n=>`Reach ${n} m in one run`,reward:90},
  {id:'perf',  t:16, kind:'cum',   text:n=>`Land ${n} perfect flings`,reward:90},
  {id:'combo', t:10, kind:'runmax',text:n=>`Chain an x${n} combo`,reward:100},
  {id:'coins', t:180,kind:'cum',   text:n=>`Collect ${n} coins`,reward:80},
  {id:'runs',  t:6,  kind:'cum',   text:n=>`Finish ${n} runs`,reward:80},
];
function dayKey(){ const d=new Date(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; }
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return h; }
const Daily={
  load(){ let d=Store.get('coil_daily',null); const k=dayKey();
    if(!d||d.date!==k){ d={date:k,idx:hashStr(k)%GOALS.length,prog:0,done:false}; Store.set('coil_daily',d); }
    this.d=d; this.g=GOALS[d.idx]; },
  save(){ Store.set('coil_daily',this.d); },
  report(kind,val){ if(this.d.done) return false; const g=this.g;
    if(g.kind==='cum'){ if(kind===g.id) this.d.prog+=val; } else { if(kind===g.id) this.d.prog=Math.max(this.d.prog,val); }
    if(this.d.prog>=g.t){ this.d.done=true; Profile.addCoins(g.reward); this.save(); return true; } this.save(); return false; },
  pct(){ return clamp(this.d.prog/this.g.t,0,1); }
};
Daily.load();

/* ---------- zones + milestones ---------- */
const ZONES=[
  {name:'NEON ORBIT', from:0,   bg:['#160e33','#0a0720','#04030a']},
  {name:'GLITCH STORM',from:250,bg:['#2a0f33','#160a26','#06030f']},
  {name:'DEEP VOID',  from:600, bg:['#0a1430','#05081c','#020208']},
];
const MILESTONES=[100,250,500,1000,2000,4000];
const MILE_REWARD={100:5,250:10,500:15,1000:25,2000:40,4000:60};

/* =========================================================================
   PHYSICS CONSTANTS (Hybrid: constant launch, forgiving survival)
   ========================================================================= */
const OMEGA=2.7;          // orbit angular speed (rad/s) — rhythm of the gate
const ORBIT=54;           // fixed orbit radius (predictable timing)
const LAUNCH=580;         // CONSTANT fling speed (no charge, no overcharge)
const G_FALL=520;         // gravity during flight (floaty arcs)
const WALL=0.82;          // side-wall bounce
const CATCH_PAD=22;       // generous auto-latch forgiveness (survival)
const GATE_MARGIN=6;      // the gate UNDER-promises: it only lights up angles whose closest
                          // approach is within T.r+pl.r+6, while the real catch is +22. That
                          // 16px buffer means small sub-step dips (wall bounces, grazes) can
                          // never make a lit gate lie. Verified: 0 dishonest gates / 24k nodes.
const PERFECT_TOL0=0.36;  // base perfect angular window (radians, narrows w/ height)

/* =========================================================================
   GAME STATE
   ========================================================================= */
let scene='home';   // home | play | over | shop
let seenTut=Store.get('coil_seen_tut_h',false);
let aimPreview=Store.get('coil_aim',true);   // QA toggle: trajectory preview on/off (gate always shows)
const G={ cameraY:0 };

function resetRun(){
  G.t=0; G.cameraY=-0.42*H; G.nodes=[]; G.sparks=[];
  G.maxY=0; G.height=0; G.combo=1; G.maxCombo=1; G.perfects=0; G.coins=0; G.flings=0;
  G.lastNodeY=-90; G.dead=false; G.deadT=0; G.voidY=-1.5*H; G.shield=false; G.invuln=0;
  G.beatBest=false; G.zone=0; G.nextMilestone=0; G.toast=null; G.sweet=null; G.target=null;
  G.tut=seenTut?-1:0; G.tutT=0;
  const start={wx:W/2,wy:-90,r:18,type:'normal',baseX:W/2,next:null};
  G.nodes.push(start); G.lastNodeY=start.wy;
  G.player={ wx:W/2,wy:-30,vx:0,vy:0,latched:true,node:start,ang:Math.PI/2,dir:1,r:8,trail:[],face:0,zap:0,
             lastReleased:null,lastReleasedT:0 };
  for(let i=0;i<11;i++) genNode();
  G.target=start.next;
  computeSweetZone();
}
function sY(wy){ return H-(wy-G.cameraY); }

function genNode(){
  const idx=G.nodes.length, prev=G.nodes[G.nodes.length-1];
  const hm=G.lastNodeY/12, easy=idx<6||hm<55, diff=clamp(hm/650,0,1);
  const gap=easy?rand(92,118):rand(108,lerp(135,172,diff));
  let ny=G.lastNodeY+gap;
  const maxOff=Math.min(gap*0.7, easy?44:lerp(64,100,diff));
  let nx=clamp((prev?prev.wx:W/2)+rand(-maxOff,maxOff),52,W-52);
  let type='normal', r=18;
  // NOTE: 'move' nodes are intentionally NOT generated. A moving target drifts during the
  // ~0.4s flight, so the gate (which aims at the target's position at release) cannot stay
  // truthful without lead-prediction. Until that exists, we keep every gate honest by using
  // only static targets. The move-node update/recompute code below is left dormant so moving
  // nodes can be re-enabled later if a predictive gate is added.
  if(!easy){ const roll=Math.random();
    if(hm>140 && roll<0.12+diff*0.10){ type='small'; r=13; } }
  if(!easy && hm>150 && Math.random()<0.05){ type='bonus'; r=19; }
  // FAIRNESS: the player orbits prev and flings to this node. Guarantee the gate from prev
  // to here is comfortably hittable for EITHER arrival direction; if not, pull this node
  // toward straight-up over prev (which always widens the window). Easy jumps are always
  // fair, so we skip the (more expensive) check for them. Uses base positions.
  if(prev && !easy){
    const pbx=prev.type==='move'?prev.baseX:prev.wx, MIN_FAIR=0.30;
    const pivot={wx:pbx,wy:prev.wy,r:prev.r};
    let cw=nx, cy=ny, bestW=-1, bw=nx, by=ny, tries=0;
    while(tries<6){
      const cand={wx:cw,wy:cy,r};
      const w=Math.min(gateWidth(pivot,cand,1), gateWidth(pivot,cand,-1));
      if(w>bestW){ bestW=w; bw=cw; by=cy; }
      if(w>=MIN_FAIR) break;
      cw=lerp(cw,pbx,0.5); cy=lerp(cy,prev.wy+Math.min(ny-prev.wy,130),0.35); tries++;
    }
    if(bestW<MIN_FAIR){ bw=pbx; by=prev.wy+110; }   // last resort: straight up, modest gap — always fair
    nx=clamp(bw,52,W-52); ny=by;
  }
  const node={wx:nx,wy:ny,r,type,baseX:nx,next:null,
    amp:type==='move'?rand(30,70):0, ph:rand(0,TAU), spd:rand(.7,1.2), pulse:rand(0,TAU)};
  if(prev) prev.next=node;
  G.nodes.push(node); G.lastNodeY=ny;
  // collectibles
  if(Math.random()<0.5) G.sparks.push({wx:clamp(nx+rand(-55,55),20,W-20),wy:ny-gap*0.5,got:false,kind:'spark'});
  else if(hm>240 && Math.random()<0.05) G.sparks.push({wx:clamp(nx+rand(-50,50),20,W-20),wy:ny-gap*0.5,got:false,kind:'shield'});
}

/* mirror of the in-game flight: constant launch + gravity + wall bounce, returns the closest
   the swept path comes to T. Used by the gate + fairness checks so they speak EXACTLY the
   same physics as real play. */
function arcMinApproach(n,T,dir,relAng){
  const pl=G.player, tr=T.r+pl.r, plr=pl.r, Wp=W-pl.r, Tx=T.wx, Ty=T.wy;
  let x=n.wx+Math.cos(relAng)*ORBIT, y=n.wy+Math.sin(relAng)*ORBIT;
  const tx=-Math.sin(relAng)*dir, ty=Math.cos(relAng)*dir; let vx=tx*LAUNCH, vy=ty*LAUNCH; const h=1/60;
  let md2=1e18; const stopY=Ty-160, hit2=(tr-2)*(tr-2);
  for(let s=0;s<120;s++){ const px=x,py=y; vy-=G_FALL*h; x+=vx*h; y+=vy*h;
    if(x<plr){x=plr;vx=Math.abs(vx)*WALL;} if(x>Wp){x=Wp;vx=-Math.abs(vx)*WALL;}
    // squared distance from T to the swept segment (px,py)->(x,y) — no sqrt in the loop
    const abx=x-px, aby=y-py, ab2=abx*abx+aby*aby;
    let t=ab2>0?((Tx-px)*abx+(Ty-py)*aby)/ab2:0; t=t<0?0:t>1?1:t;
    const dx=px+abx*t-Tx, dy=py+aby*t-Ty, d2=dx*dx+dy*dy;
    if(d2<md2) md2=d2;
    if(d2<hit2) break;                            // reached the target
    if(vy<0 && y<stopY) break;                    // fallen past it & descending — can't get closer
  }
  return Math.sqrt(md2);
}
/* ---- the heart of the Hybrid: the glowing gate that aims at the target ----
   gateBand() is the SINGLE source of truth, used by both the runtime gate and the
   gen-time fairness check, so they can never disagree. Honesty is GUARANTEED:
     1. Only angles whose real swept flight comes within T.r+pl.r+GATE_MARGIN(6) light up;
        real catch is +CATCH_PAD(22) → a 16px buffer no sub-step dip can cross.
     2. EVERY catchable lobe is marched with the real flight physics; the WIDEST one wins
        (near walls the set fragments into thin slivers + one fat inner lobe — we take the
        fat one). The dim band is that true lobe.
     3. The bright PERFECT window is clamped INSIDE the lobe → hitting the centre reliably
        both catches AND scores perfect.
   Verified on the actual in-file code over thousands of nodes: 0 unreachable, 0 dim
   misses, 0 perfect misses, fair minimum window. */
function gateBand(n,T,dir,want,minStop){
  const SAMP=48, st=TAU/SAMP, thr=T.r+G.player.r+GATE_MARGIN; const ok=new Array(SAMP); let any=false;
  for(let i=0;i<SAMP;i++){ ok[i]=arcMinApproach(n,T,dir,i*st)<thr; if(ok[i])any=true; }
  if(!any) return {reachable:false};
  if(ok.every(v=>v)) return {lo:0,hi:TAU,center:0,tol:Math.min(want,Math.PI),reachable:true}; // degenerate
  const D=0.018; let bLo=0,bHi=0,bW=-1;
  for(let i=0;i<SAMP;i++){
    if(!(ok[i]&&!ok[(i-1+SAMP)%SAMP])) continue;          // run start
    let l=0,j=i; while(ok[j%SAMP]){l++;j++; if(l>=SAMP)break;}
    const c0=(i+l/2)*st; if(arcMinApproach(n,T,dir,c0)>=thr) continue;
    let lo=c0,hi=c0,k=0;                                  // march this lobe with real physics
    while(k<300 && arcMinApproach(n,T,dir,lo-D)<thr){ lo-=D; k++; }
    k=0; while(k<300 && arcMinApproach(n,T,dir,hi+D)<thr){ hi+=D; k++; }
    if(hi-lo>bW){ bW=hi-lo; bLo=lo; bHi=hi; }             // keep the widest marched lobe
    if(minStop && bW>=minStop) break;                     // gen check: a fair-enough lobe is plenty
  }
  if(bW<0) return {reachable:false};
  const pmid=(bLo+bHi)/2, phalf=Math.min(want,(bHi-bLo)/2);
  return {lo:bLo, hi:bHi, center:pmid, tol:phalf, reachable:true};
}
function gateWidth(n,T,dir){ const b=gateBand(n,T,dir,0,0.30); return b.reachable?(b.hi-b.lo):0; }

function computeSweetZone(){
  const pl=G.player, n=pl.node, T=G.target;
  if(!T){ G.sweet=null; return; }
  const want=PERFECT_TOL0*lerp(1,0.62,clamp(G.height/700,0,1));
  G.sweet=gateBand(n,T,pl.dir,want);
}

/* =========================================================================
   UPDATE
   ========================================================================= */
function update(dt){
  if(scene!=='play') return;
  const pl=G.player;
  if(G.invuln>0) G.invuln-=dt;
  if(pl.zap>0) pl.zap-=dt;
  if(G.dead){ G.deadT+=dt; pl.vy-=G_FALL*dt; pl.wx+=pl.vx*dt; pl.wy+=pl.vy*dt; if(G.deadT>0.55) endRun(); return; }
  G.t+=dt;
  for(const n of G.nodes){ if(n.type==='move') n.wx=n.baseX+Math.sin(G.t*n.spd+n.ph)*n.amp; }

  if(pl.latched){
    const n=pl.node; pl.ang+=pl.dir*OMEGA*dt;
    pl.wx=n.wx+Math.cos(pl.ang)*ORBIT; pl.wy=n.wy+Math.sin(pl.ang)*ORBIT;
    pl.face=lerp(pl.face,Math.atan2(Math.cos(pl.ang)*pl.dir,-Math.sin(pl.ang)*pl.dir),Math.min(1,dt*10));
    // safety: target should always exist (genNode links .next ahead of the player)
    if(!G.target && n.next){ G.target=n.next; computeSweetZone(); }
    // moving nodes: the precomputed gate would go stale, so refresh it (throttled, ~30Hz)
    if(n.type==='move' || (G.target && G.target.type==='move')){
      G._sweetTick=(G._sweetTick||0)+1; if(G._sweetTick>=2){ G._sweetTick=0; computeSweetZone(); }
    }
  } else {
    const px=pl.wx, py=pl.wy; pl.vy-=G_FALL*dt; pl.wx+=pl.vx*dt; pl.wy+=pl.vy*dt;
    if(pl.wx<pl.r){pl.wx=pl.r;pl.vx=Math.abs(pl.vx)*WALL;} if(pl.wx>W-pl.r){pl.wx=W-pl.r;pl.vx=-Math.abs(pl.vx)*WALL;}
    pl.face=lerp(pl.face,Math.atan2(pl.vy,pl.vx),Math.min(1,dt*10));
    pl.trail.push({x:pl.wx,y:pl.wy}); if(pl.trail.length>12) pl.trail.shift();
    for(const n of G.nodes){
      const sd=distPointToSegment(n.wx,n.wy,px,py,pl.wx,pl.wy);
      if(sd<n.r+pl.r+CATCH_PAD && n!==pl.lastReleased){
        const dx=pl.wx-n.wx,dy=pl.wy-n.wy,d=Math.hypot(dx,dy)||0.001; latch(n,d,dx,dy); break; }
    }
    pl.lastReleasedT+=dt; if(pl.lastReleasedT>0.25) pl.lastReleased=null;
  }

  G.maxY=Math.max(G.maxY,pl.wy); G.height=Math.max(0,Math.round((G.maxY+90)/12));
  const camT=pl.wy-0.42*H; if(camT>G.cameraY) G.cameraY=lerp(G.cameraY,camT,Math.min(1,dt*6));

  if(!G.beatBest && Profile.best>0 && G.height>Profile.best){ G.beatBest=true; G.toast={txt:'NEW BEST!',t:1.6,c:'#9be35a'}; SFX.milestone(); }
  while(G.nextMilestone<MILESTONES.length && G.height>=MILESTONES[G.nextMilestone]){
    const m=MILESTONES[G.nextMilestone]; G.nextMilestone++; const rw=MILE_REWARD[m]||10;
    G.toast={txt:m+' M',t:1.4,c:'#fff'}; G.coins+=rw; SFX.milestone(); shake(2,.12); }
  let z=0; for(let i=0;i<ZONES.length;i++) if(G.height>=ZONES[i].from) z=i;
  if(z!==G.zone){ G.zone=z; G.toast={txt:ZONES[z].name,t:1.6,c:skin().t}; }

  // void pressure — a SKILL-FAIR chaser (not a timer). It creeps up steadily but slower than
  // efficient climbing, and never lags more than 'lead' behind your highest point. So good
  // play stays ahead indefinitely; hesitating on the orbit or missing a node is what the void
  // punishes. The lead shrinks over time to keep raising the pressure. (Was a quadratic timer
  // that capped every player — even flawless ones — at the same height.)
  const lead=lerp(H*1.45, H*0.9, clamp(G.t/110,0,1));
  G.voidY += (26 + clamp(G.t,0,110)*0.40 + Math.max(0,G.t-110)*0.05) * dt;
  G.voidY = Math.max(G.voidY, G.maxY - lead);
  if(G.invuln<=0 && pl.wy<=G.voidY+pl.r){ hit('void'); return; }
  if(sY(pl.wy)>H+160 && !pl.latched && G.invuln<=0){ hit('fall'); return; }

  // collectibles
  for(const s of G.sparks){ if(s.got) continue;
    if(Math.hypot(pl.wx-s.wx,pl.wy-s.wy)<24){ s.got=true;
      if(s.kind==='shield'){ G.shield=true; SFX.shield(); P.ring(s.wx,sY(s.wy),'#9ffff2',16,200); Pop.add(s.wx,sY(s.wy),'SHIELD','#9ffff2'); }
      else { G.coins+=2; SFX.coin(); P.burst(s.wx,sY(s.wy),6,'#ffe39b',160,.4,3); Pop.add(s.wx,sY(s.wy),'+2',skin().t); } } }

  while(G.lastNodeY<pl.wy+H*1.5) genNode();
  G.nodes=G.nodes.filter(n=>n.wy>G.voidY-120);
  G.sparks=G.sparks.filter(s=>!s.got && s.wy>G.voidY-120);

  if(G.tut>=0){ G.tutT+=dt; if(G.tut===1 && G.tutT>4.5){ G.tut=2; G.tutT=0; }
    if(G.tut===2 && G.tutT>3.5){ G.tut=-1; if(!seenTut){ seenTut=true; Store.set('coil_seen_tut_h',true); } } }
  if(G.toast){ G.toast.t-=dt; if(G.toast.t<=0) G.toast=null; }
}

function latch(n,d,dx,dy){
  const pl=G.player; pl.latched=true; pl.node=n; pl.ang=Math.atan2(dy,dx);
  const cross=pl.vx*Math.sin(pl.ang)-pl.vy*Math.cos(pl.ang); pl.dir=cross>=0?1:-1;
  pl.trail.length=0; SFX.catch(G.combo);
  P.burst(n.wx,sY(n.wy),8,skin().c,140,.35,3.5);
  if(n.type==='bonus'){ const g=25; G.coins+=g; SFX.bonus(); P.ring(n.wx,sY(n.wy),'#ffd24a',20,300); Pop.add(n.wx,sY(n.wy)-16,'+'+g+' ◎','#ffd24a'); n.type='normal'; n.r=18; }
  G.target=n.next; computeSweetZone();
  if(G.tut===0){ G.tut=1; G.tutT=0; }
}

function release(){
  const pl=G.player; if(!pl.latched) return;
  G.flings++;
  const tx=-Math.sin(pl.ang)*pl.dir, ty=Math.cos(pl.ang)*pl.dir;
  // CONSTANT launch — survival never depends on precision
  pl.vx=tx*LAUNCH; pl.vy=ty*LAUNCH; pl.latched=false; pl.lastReleased=pl.node; pl.lastReleasedT=0;
  // PERFECT is pure reward: did we fling inside the bright gate?
  const sw=G.sweet, isPerfect = sw && sw.reachable && angDiff(pl.ang,sw.center)<=sw.tol;
  if(isPerfect){
    G.perfects++; G.combo=Math.min(12,G.combo+1); G.maxCombo=Math.max(G.maxCombo,G.combo);
    const gain=Math.round(3*G.combo); G.coins+=gain;
    SFX.perfect(G.combo); buzz(8);
    P.ring(pl.wx,sY(pl.wy),'#fff',22,330); P.burst(pl.wx,sY(pl.wy),10,skin().t,260,.5,4);
    Pop.add(pl.wx,sY(pl.wy)-18,`PERFECT x${G.combo}`,'#fff'); shake(2.5,.12); pl.zap=0.25;
  } else {
    G.combo=Math.max(1,G.combo-1); SFX.fling();
    P.ring(pl.wx,sY(pl.wy),skin().c,12,220);
  }
}

function hit(cause){
  const pl=G.player;
  if(G.shield && cause!=='fall'){ G.shield=false; G.invuln=0.7; pl.vy=720; pl.latched=false;
    SFX.shield(); shake(7,.3); P.ring(pl.wx,sY(pl.wy),'#9ffff2',26,360); G.toast={txt:'SHIELD USED',t:1.0,c:'#9ffff2'}; return; }
  if(G.dead) return;
  G.dead=true; G.deadT=0; pl.latched=false; SFX.death(); buzz(30); shake(11,.5);
  P.burst(pl.wx,sY(pl.wy),30,skin().c,360,.7,7);
}

function endRun(){
  const h=G.height,mc=G.maxCombo,perf=G.perfects,coins=G.coins;
  const newBest=Profile.setBest(h);
  const xpGain=h+perf*6+mc*3+10; const prevLvl=Profile.level();
  Profile.addXP(xpGain); Profile.addCoins(coins);
  const leveledUp=Profile.level()>prevLvl;
  const dDone=[Daily.report('runs',1),Daily.report('perf',perf),Daily.report('coins',coins),
               Daily.report('height',h),Daily.report('combo',mc)].some(Boolean);
  if(leveledUp||dDone) SFX.unlock();
  Result.show({h,mc,perf,coins,newBest,xpGain,leveledUp,dailyJustDone:dDone});
  scene='over';
}

/* =========================================================================
   RENDER — GAMEPLAY
   ========================================================================= */
const STARS=[]; for(let i=0;i<64;i++) STARS.push({x:Math.random(),y:Math.random(),d:rand(.08,.45),s:rand(1,2.4),a:rand(.12,.4)});
function drawBG(){
  const h=G.height||0; let z0=ZONES[0],z1=ZONES[0],tt=0;
  for(let i=0;i<ZONES.length;i++){ if(h>=ZONES[i].from){ z0=ZONES[i]; z1=ZONES[Math.min(i+1,ZONES.length-1)];
    const span=(z1.from-z0.from)||1; tt=clamp((h-z0.from)/span,0,1); } }
  const mix=(a,b)=>{ const pa=parseInt(a.slice(1),16),pb=parseInt(b.slice(1),16);
    const r=Math.round(lerp((pa>>16)&255,(pb>>16)&255,tt)),g=Math.round(lerp((pa>>8)&255,(pb>>8)&255,tt)),bl=Math.round(lerp(pa&255,pb&255,tt));
    return `rgb(${r},${g},${bl})`; };
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,mix(z0.bg[0],z1.bg[0])); g.addColorStop(.5,mix(z0.bg[1],z1.bg[1])); g.addColorStop(1,mix(z0.bg[2],z1.bg[2]));
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  const cam=G.cameraY||0; ctx.fillStyle='#aab8ff';
  for(const st of STARS){ const yy=(((st.y*H+cam*st.d)%H)+H)%H; ctx.globalAlpha=st.a; ctx.fillRect(st.x*W,yy,st.s,st.s); } ctx.globalAlpha=1;
}
function drawNode(n){
  const x=n.wx,y=sY(n.wy),sk=skin(); if(y<-60||y>H+60) return;
  const bonus=n.type==='bonus', col=bonus?'#ffd24a':n.type==='small'?sk.t:sk.c;
  const pr=n.r*(1+Math.sin(G.t*2+n.pulse)*0.06);
  ctx.save(); ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=glowFX(bonus?24:18);
  ctx.beginPath(); ctx.arc(x,y,pr,0,TAU); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.85)'; ctx.beginPath(); ctx.arc(x-pr*0.3,y-pr*0.3,pr*0.28,0,TAU); ctx.fill();
  ctx.restore();
}
/* the glowing gate: safe band (dim) + perfect band (bright), drawn on the orbit */
function drawGate(){
  const pl=G.player, sw=G.sweet; if(!pl.latched||!sw||!sw.reachable) return;
  const n=pl.node, cx=n.wx, cy=sY(n.wy), sk=skin();
  ctx.save();
  // safe release band
  ctx.strokeStyle=sk.c; ctx.globalAlpha=.30; ctx.lineWidth=6; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(cx,cy,ORBIT, sw.lo, sw.hi); ctx.stroke();
  // perfect band
  const inPerfect=angDiff(pl.ang,sw.center)<=sw.tol;
  ctx.globalAlpha=inPerfect?1:.85; ctx.strokeStyle=inPerfect?'#ffffff':sk.t; ctx.lineWidth=inPerfect?8:6;
  ctx.shadowColor=inPerfect?'#fff':sk.t; ctx.shadowBlur=glowFX(inPerfect?16:8);
  ctx.beginPath(); ctx.arc(cx,cy,ORBIT, sw.center-sw.tol, sw.center+sw.tol); ctx.stroke();
  ctx.restore();
}
function drawPlayer(){
  const pl=G.player, x=pl.wx, y=sY(pl.wy), sk=skin();
  if(!pl.latched && pl.trail.length>1){ ctx.save(); ctx.strokeStyle=sk.c; ctx.lineCap='round';
    for(let i=1;i<pl.trail.length;i++){ const a=i/pl.trail.length; ctx.globalAlpha=a*0.5; ctx.lineWidth=a*pl.r*1.3;
      ctx.beginPath(); ctx.moveTo(pl.trail[i-1].x,sY(pl.trail[i-1].y)); ctx.lineTo(pl.trail[i].x,sY(pl.trail[i].y)); ctx.stroke(); } ctx.restore(); }
  // tether
  if(pl.latched){ const n=pl.node; ctx.save(); ctx.strokeStyle=sk.c; ctx.globalAlpha=.4; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(n.wx,sY(n.wy)); ctx.lineTo(x,y); ctx.stroke(); ctx.restore(); }
  // shield bubble
  if(G.shield){ ctx.save(); ctx.strokeStyle='#9ffff2'; ctx.globalAlpha=.6+Math.sin(G.t*6)*.2; ctx.lineWidth=2.5;
    ctx.shadowColor='#9ffff2'; ctx.shadowBlur=glowFX(12); ctx.beginPath(); ctx.arc(x,y,pl.r+8,0,TAU); ctx.stroke(); ctx.restore(); }
  const sw=G.sweet, inPerfect=pl.latched&&sw&&sw.reachable&&angDiff(pl.ang,sw.center)<=sw.tol;
  if(!(G.invuln>0 && Math.sin(G.t*40)<0)){
    if(pl.zap>0){ ctx.save(); ctx.translate(x,y); ctx.strokeStyle='#fff'; ctx.globalAlpha=clamp(pl.zap/0.25,0,1); ctx.lineWidth=2; ctx.shadowColor='#fff'; ctx.shadowBlur=12;
      const z=lerp(pl.r+4,pl.r+16,1-pl.zap/0.25); for(let i=0;i<6;i++){const a=i/6*TAU+G.t; ctx.beginPath(); ctx.moveTo(Math.cos(a)*(pl.r+2),Math.sin(a)*(pl.r+2)); ctx.lineTo(Math.cos(a)*z,Math.sin(a)*z); ctx.stroke();} ctx.restore(); }
    const sp=pl.latched?0:Math.hypot(pl.vx,pl.vy), stretch=clamp(sp/1400,0,.5);
    const scale=inPerfect?1.08:1; const glow=inPerfect?28:18;
    ctx.save(); ctx.translate(x,y); ctx.rotate(pl.face);
    ctx.fillStyle=sk.c; ctx.shadowColor=sk.c; ctx.shadowBlur=glowFX(glow);
    ctx.beginPath(); ctx.ellipse(0,0,pl.r*scale*(1+stretch),pl.r*scale*(1-stretch*0.6),0,0,TAU); ctx.fill();
    ctx.rotate(-pl.face); const ex=Math.cos(pl.face),ey=Math.sin(pl.face), eyeR=inPerfect?3.0:2.6;
    for(const o of [-1,1]){ const px=ey*o*3.2,py=-ex*o*3.2;
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(px+ex*2,py+ey*2,eyeR,0,TAU); ctx.fill();
      ctx.fillStyle='#0a0720'; ctx.beginPath(); ctx.arc(px+ex*3.2,py+ey*3.2,1.3,0,TAU); ctx.fill(); }
    ctx.restore();
  }
}
function drawTrajectory(){
  const pl=G.player; if(!aimPreview||!pl.latched||G.dead) return; const sk=skin();
  const tx=-Math.sin(pl.ang)*pl.dir, ty=Math.cos(pl.ang)*pl.dir;
  let x=pl.wx,y=pl.wy,vx=tx*LAUNCH,vy=ty*LAUNCH; const h=1/60, steps=46;
  ctx.save(); ctx.fillStyle=sk.c;
  for(let i=0;i<steps;i++){ vy-=G_FALL*h; x+=vx*h; y+=vy*h;
    if(x<pl.r){x=pl.r;vx=Math.abs(vx)*WALL;} if(x>W-pl.r){x=W-pl.r;vx=-Math.abs(vx)*WALL;}
    let hitN=false; for(const n of G.nodes){ if(n===pl.node) continue; if(Math.hypot(x-n.wx,y-n.wy)<n.r+pl.r+CATCH_PAD){hitN=true;break;} }
    if(i%3===0){ ctx.globalAlpha=clamp(1-i/steps,0,.5); ctx.beginPath(); ctx.arc(x,sY(y),2.2,0,TAU); ctx.fill(); }
    if((hitN&&i>2)||y<G.voidY) break; }
  ctx.restore();
}
function drawVoid(){
  const vy=sY(G.voidY); if(vy<H+40){
    const g=ctx.createLinearGradient(0,vy-50,0,H);
    g.addColorStop(0,'rgba(255,59,92,0)'); g.addColorStop(.4,'rgba(255,59,92,.25)'); g.addColorStop(1,'rgba(120,10,40,.9)');
    ctx.fillStyle=g; ctx.fillRect(0,vy-50,W,H-(vy-50)+50);
    ctx.strokeStyle='#ff3b5c'; ctx.lineWidth=3; ctx.shadowColor='#ff3b5c'; ctx.shadowBlur=glowFX(18);
    ctx.beginPath(); ctx.moveTo(0,vy); ctx.lineTo(W,vy); ctx.stroke(); ctx.shadowBlur=0; }
}
function tutLines(){ return ['TAP IN THE GLOWING GATE','FLY UP, ONE GATE AT A TIME','HIT THE BRIGHT CENTER FOR PERFECT']; }

function renderPlay(){
  drawBG(); drawVoid();
  for(const n of G.nodes) drawNode(n);
  for(const s of G.sparks){ if(s.got)continue; const y=sY(s.wy); if(y<-20||y>H+20)continue;
    const shield=s.kind==='shield', col=shield?'#9ffff2':'#ffe39b';
    ctx.save(); ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=glowFX(12); ctx.translate(s.wx,y); ctx.rotate(G.t*3);
    if(shield){ ctx.lineWidth=2; ctx.strokeStyle=col; ctx.beginPath(); ctx.arc(0,0,7,0,TAU); ctx.stroke(); ctx.beginPath(); ctx.arc(0,0,3,0,TAU); ctx.fill(); }
    else { ctx.beginPath(); for(let i=0;i<4;i++){const a=i/4*TAU; ctx.lineTo(Math.cos(a)*6,Math.sin(a)*6); ctx.lineTo(Math.cos(a+.4)*2.5,Math.sin(a+.4)*2.5);} ctx.closePath(); ctx.fill(); }
    ctx.restore(); }
  drawGate(); drawTrajectory(); drawPlayer(); Pop.draw();

  const closeness=clamp(1-(G.player.wy-G.voidY)/240,0,1);
  if(closeness>0.05){ ctx.save(); const a=closeness*0.5*(0.7+Math.sin(G.t*8)*0.3);
    const g=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.7);
    g.addColorStop(0,'rgba(255,59,92,0)'); g.addColorStop(1,`rgba(255,59,92,${a})`); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); ctx.restore(); }

  // HUD
  text(G.height+' m', W/2, 40+SAFE_TOP, 30, '#fff', 800, 16, 'center', "'Unbounded'");
  if(G.combo>1) text('PERFECT x'+G.combo, W/2, 72+SAFE_TOP, 15, '#ffb020', 700, 8);
  text('◎ '+(Profile.coins+G.coins), W-16, 28+SAFE_TOP, 14, '#ffe39b', 700, 6, 'right');

  if(G.tut>=0){ const lines=tutLines(); ctx.globalAlpha=clamp(1-(G.tutT-3)/1.5,0,1);
    text(lines[G.tut], W/2, H*0.72, 18, '#fff', 700, 10); ctx.globalAlpha=1; }
  if(G.toast){ const a=clamp(G.toast.t,0,1); ctx.globalAlpha=a;
    text(G.toast.txt, W/2, H*0.42, 30, G.toast.c, 800, 18, 'center', "'Unbounded'"); ctx.globalAlpha=1; }
}

/* ----- HOME ----- */
function nextGoalLine(){
  if(!Daily.d.done) return "Complete today's mission";
  const nm=MILESTONES.find(m=>m>Profile.best);
  if(nm && Profile.best>=nm*0.6) return 'Reach '+nm+' m';
  if(Profile.best>0) return 'Beat your best: '+Profile.best+' m';
  const ns=SKINS.find(s=>!Owned.includes(s.id)); if(ns) return 'Unlock '+ns.name;
  return 'Climb as high as you can';
}
let homeT=0;
function renderHome(dt){
  homeT+=dt; drawBG();
  const cx=W/2, cy=H*0.32, sk=skin(); const ang=homeT*1.6, R=64;
  ctx.save(); ctx.strokeStyle='rgba(255,255,255,.08)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(cx,cy,R,0,TAU); ctx.stroke(); ctx.restore();
  // a hint of the gate on the home logo
  ctx.save(); ctx.strokeStyle=sk.t; ctx.globalAlpha=.7; ctx.lineWidth=6; ctx.lineCap='round'; ctx.shadowColor=sk.t; ctx.shadowBlur=12;
  ctx.beginPath(); ctx.arc(cx,cy,R, -0.5, 0.5); ctx.stroke(); ctx.restore();
  ctx.save(); ctx.fillStyle=sk.c; ctx.shadowColor=sk.c; ctx.shadowBlur=20; ctx.beginPath(); ctx.arc(cx,cy,14,0,TAU); ctx.fill(); ctx.restore();
  const px=cx+Math.cos(ang)*R, py=cy+Math.sin(ang)*R;
  ctx.save(); ctx.strokeStyle=sk.c; ctx.globalAlpha=.4; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(px,py); ctx.stroke(); ctx.restore();
  const face=ang+Math.PI/2;
  ctx.save(); ctx.translate(px,py); ctx.fillStyle=sk.c; ctx.shadowColor=sk.c; ctx.shadowBlur=16; ctx.beginPath(); ctx.arc(0,0,8,0,TAU); ctx.fill();
  const ex=Math.cos(face),ey=Math.sin(face);
  for(const o of [-1,1]){ const ox=ey*o*3,oy=-ex*o*3; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(ox+ex*2,oy+ey*2,2.4,0,TAU); ctx.fill(); ctx.fillStyle='#0a0720'; ctx.beginPath(); ctx.arc(ox+ex*3,oy+ey*3,1.2,0,TAU); ctx.fill(); } ctx.restore();

  text('COIL', cx, cy-118, 64, '#fff', 800, 26, 'center', "'Unbounded'");
  text('Tap in the glowing gate · climb the void', cx, cy-76, 13, '#9fb0e0', 600, 0);

  const lp=Profile.levelProgress();
  text('BEST  '+Profile.best+' m', cx, H*0.55, 22, sk.t, 700, 8);
  text(Profile.title()+'  ·  Level '+lp.l, cx, H*0.55+30, 13, '#9fb0e0', 600, 0);

  const dg=Daily.g, bx=W*0.12, bw=W*0.76, by=H*0.625;
  ctx.fillStyle='#8a93bf'; ctx.font="600 11px 'Sora'"; ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText('DAILY MISSION', bx, by-4);
  ctx.textAlign='right'; ctx.fillStyle=Daily.d.done?'#9be35a':'#ffe39b'; ctx.fillText(Daily.d.done?'COMPLETE ✓':('+'+dg.reward+' ◎'), bx+bw, by-4);
  ctx.textAlign='left'; ctx.fillStyle='#dfe7ff'; ctx.font="600 13px 'Sora'"; ctx.fillText(dg.text(dg.t), bx, by+16);
  rr(bx,by+30,bw,8,4); ctx.fillStyle='rgba(255,255,255,.08)'; ctx.fill(); rr(bx,by+30,bw*Daily.pct(),8,4); ctx.fillStyle=Daily.d.done?'#9be35a':'#2ff3e0'; ctx.fill();

  text('NEXT  ·  '+nextGoalLine(), cx, H*0.735, 13, '#ffe39b', 700, 6);

  const pw=W*0.62,ph=60,pxx=W/2-pw/2,pyy=H*0.79, pulse=1+Math.sin(homeT*3)*0.02;
  ctx.save(); ctx.translate(W/2,pyy+ph/2); ctx.scale(pulse,pulse); ctx.translate(-W/2,-(pyy+ph/2));
  rr(pxx,pyy,pw,ph,14); ctx.fillStyle=sk.c; ctx.shadowColor=sk.c; ctx.shadowBlur=22; ctx.fill(); ctx.restore();
  text('PLAY', W/2, pyy+ph/2, 22, '#04030a', 800, 0, 'center', "'Unbounded'");
  btn('play',pxx,pyy,pw,ph,()=>startPlay());

  const sw=W*0.62,sh=46,sxx=W/2-sw/2,syy=pyy+ph+12;
  rr(sxx,syy,sw,sh,12); ctx.fillStyle='rgba(20,16,48,.7)'; ctx.fill(); ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=1.5; ctx.stroke();
  text('◎ '+Profile.coins+'   ·   COLLECTION', W/2, syy+sh/2, 15, sk.t, 700, 4);
  btn('shop',sxx,syy,sw,sh,()=>{ scene='shop'; });
  drawTopToggles();
}

/* ----- RESULT ----- */
const Result={
  show(d){ this.d=d; this.t=0; const lp=Profile.levelProgress();
    this.bars=[
      {label:'LEVEL '+lp.l+' — '+Profile.title(), to:lp.cur/lp.need, color:'#2ff3e0', val:'+'+d.xpGain+' XP'},
      {label:'DAILY MISSION', to:Daily.pct(), color:Daily.d.done?'#9be35a':'#ffb020', val:Daily.d.done?'COMPLETE ✓':(Math.min(Daily.d.prog,Daily.g.t)+'/'+Daily.g.t)},
      {label:this.nextSkinLabel(), to:this.nextSkinPct(), color:'#ff4d8d', val:'◎ +'+d.coins},
    ]; this.anim=this.bars.map(()=>0); },
  nextSkin(){ return SKINS.find(s=>!Owned.includes(s.id)); },
  nextSkinLabel(){ const s=this.nextSkin(); return s?('NEXT SKIN: '+s.name):'ALL SKINS UNLOCKED'; },
  nextSkinPct(){ const s=this.nextSkin(); return s?clamp(Profile.coins/s.price,0,1):1; },
  header(){ const d=this.d;
    if(d.newBest) return ['NEW BEST!','#9be35a'];
    if(Profile.best>0 && d.h>=Profile.best*0.9) return ['SO CLOSE!','#ffb020'];
    if(d.mc>=8) return ['NICE RUN','#ff4d8d'];
    return ['RUN OVER','#9fb0e0']; },
  nextAction(){ const d=this.d;
    if(!Daily.d.done){ const g=Daily.g, left=g.t-Math.min(Daily.d.prog,g.t);
      if(g.kind==='cum') return `${left} to go for the daily mission`;
      return `Reach ${g.t}${g.id==='combo'?' combo':' m'} for the daily mission`; }
    const nm=MILESTONES.find(m=>m>d.h); if(nm&&d.h>=nm*0.7) return `Just ${nm-d.h} m to the ${nm} m milestone`;
    const ns=this.nextSkin(); if(ns){ const left=Math.max(0,ns.price-Profile.coins); if(left>0) return `Save ${left} ◎ to unlock ${ns.name}`; return `You can afford ${ns.name} — check the collection`; }
    return `Beat your best: ${Profile.best} m`; },
  upd(dt){ this.t+=dt; for(let i=0;i<this.bars.length;i++){ if(this.t>0.3+i*0.45) this.anim[i]=lerp(this.anim[i],this.bars[i].to,Math.min(1,dt*5)); } },
  render(){ const d=this.d, hd=this.header(); dimVoid(0.82);
    text(hd[0], W/2, H*0.13, 34, hd[1], 800, 18, 'center', "'Unbounded'");
    text(d.h+' m', W/2, H*0.21, 46, '#fff', 800, 16, 'center', "'Unbounded'");
    const sy=H*0.28;
    this.stat('BEST', Profile.best+' m', W*0.27, sy);
    this.stat('PERFECT x', String(d.mc), W*0.5, sy);
    this.stat('PERFECTS', String(d.perf), W*0.73, sy);
    let by=H*0.36;
    for(let i=0;i<this.bars.length;i++){ const b=this.bars[i];
      ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.font="600 12px 'Sora'"; ctx.fillStyle='#c5cef0'; ctx.fillText(b.label, W*0.12, by);
      ctx.textAlign='right'; ctx.fillStyle=b.color; ctx.fillText(b.val, W*0.88, by);
      rr(W*0.12,by+12,W*0.76,9,4); ctx.fillStyle='rgba(255,255,255,.08)'; ctx.fill();
      rr(W*0.12,by+12,W*0.76*clamp(this.anim[i],0,1),9,4); ctx.fillStyle=b.color; ctx.shadowColor=b.color; ctx.shadowBlur=8; ctx.fill(); ctx.shadowBlur=0; by+=46; }
    if(d.leveledUp) text('LEVEL UP!', W/2, by+4, 16, '#2ff3e0', 800, 10);
    if(d.dailyJustDone) text('MISSION COMPLETE  ◎+'+Daily.g.reward, W/2, by+(d.leveledUp?26:4), 14, '#9be35a', 700, 8);
    text(this.nextAction(), W/2, H*0.70, 14, '#9fb0e0', 600, 0);
    const pw=W*0.62,ph=58,px=W/2-pw/2,py=H*0.76, sk=skin();
    rr(px,py,pw,ph,14); ctx.fillStyle=sk.c; ctx.shadowColor=sk.c; ctx.shadowBlur=20; ctx.fill(); ctx.shadowBlur=0;
    text('PLAY AGAIN', W/2, py+ph/2, 20, '#04030a', 800, 0, 'center', "'Unbounded'");
    btn('replay',px,py,pw,ph,()=>startPlay());
    const half=(pw-12)/2;
    rr(px,py+ph+12,half,46,12); ctx.fillStyle='rgba(20,16,48,.7)'; ctx.fill(); ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=1.5; ctx.stroke();
    text('COLLECTION', px+half/2, py+ph+12+23, 13, sk.t, 700, 0); btn('rshop',px,py+ph+12,half,46,()=>{ scene='shop'; });
    rr(px+half+12,py+ph+12,half,46,12); ctx.fillStyle='rgba(20,16,48,.7)'; ctx.fill(); ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=1.5; ctx.stroke();
    text('MENU', px+half+12+half/2, py+ph+12+23, 13, '#9fb0e0', 700, 0); btn('rmenu',px+half+12,py+ph+12,half,46,()=>{ scene='home'; }); },
  stat(label,val,x,y){ text(val,x,y,22,'#fff',800,0); text(label,x,y+22,11,'#7e88b5',600,0); }
};
function dimVoid(a){ ctx.fillStyle=`rgba(6,4,16,${a})`; ctx.fillRect(0,0,W,H); }

/* ----- SHOP / COLLECTION ----- */
function renderShop(){
  drawBG(); dimVoid(0.55);
  text('COLLECTION', W/2, 46+SAFE_TOP, 26, '#fff', 800, 14, 'center', "'Unbounded'");
  text('◎ '+Profile.coins, W/2, 80+SAFE_TOP, 16, '#ffe39b', 700, 6);
  const cols=2,gap=14,mx=20, cw=(W-mx*2-gap)/cols, ch=132; let gy=110+SAFE_TOP;
  for(let i=0;i<SKINS.length;i++){
    const s=SKINS[i], col=i%cols, row=Math.floor(i/cols), x=mx+col*(cw+gap), y=gy+row*(ch+gap);
    const owned=Owned.includes(s.id), eq=equipped===s.id;
    rr(x,y,cw,ch,14); ctx.fillStyle='rgba(16,12,38,.9)'; ctx.fill();
    ctx.lineWidth=2; ctx.strokeStyle=eq?s.c:'rgba(255,255,255,.08)'; if(eq){ctx.shadowColor=s.c;ctx.shadowBlur=14;} ctx.stroke(); ctx.shadowBlur=0;
    const pcx=x+cw/2,pcy=y+44;
    ctx.save(); if(owned){ ctx.fillStyle=s.c; ctx.shadowColor=s.c; ctx.shadowBlur=16; } else ctx.fillStyle='#2a2550';
    ctx.beginPath(); ctx.arc(pcx,pcy,16,0,TAU); ctx.fill(); if(owned){ ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(pcx,pcy,6,0,TAU); ctx.fill(); } ctx.restore();
    text(s.name,pcx,y+82,15,owned?'#fff':'#7e88b5',700,0);
    if(eq){ text('EQUIPPED',pcx,y+108,13,s.c,700,4); }
    else if(owned){ text('EQUIP',pcx,y+108,13,'#9fb0e0',700,0); btn('eq'+s.id,x,y,cw,ch,()=>{ equipped=s.id; Store.set('coil_skin',s.id); }); }
    else { const can=Profile.coins>=s.price; text((can?'BUY  ':'')+s.price+' ◎',pcx,y+108,13,can?'#ffe39b':'#7e88b5',700,can?4:0);
      if(can) btn('buy'+s.id,x,y,cw,ch,()=>{ if(Profile.coins>=s.price){ Profile.coins-=s.price; Store.set('coil_coins',Profile.coins); Owned.push(s.id); Store.set('coil_skins',Owned); equipped=s.id; Store.set('coil_skin',s.id); SFX.unlock(); } }); }
  }
  const bw=W*0.5,bh=48,bx=W/2-bw/2,by=H-70;
  rr(bx,by,bw,bh,12); ctx.fillStyle=skin().c; ctx.shadowColor=skin().c; ctx.shadowBlur=16; ctx.fill(); ctx.shadowBlur=0;
  text('BACK',W/2,by+bh/2,16,'#04030a',800,0); btn('back',bx,by,bw,bh,()=>{ scene='home'; });
}

/* =========================================================================
   FLOW + INPUT
   ========================================================================= */
function startPlay(){ resetRun(); scene='play'; }
let inputLock=false;
function pos(e){ const r=cv.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; }
function onDown(e){ ac(); e.preventDefault();
  if(inputLock) return; inputLock=true; setTimeout(()=>inputLock=false,40);
  const {x,y}=pos(e);
  if(scene!=='play'){ hitButtons(x,y); return; }
  if(!G.dead) release();
}
cv.addEventListener('pointerdown', onDown, {passive:false});
cv.addEventListener('pointercancel', ()=>{ inputLock=false; }, {passive:false});
cv.addEventListener('contextmenu', e=>e.preventDefault());

/* =========================================================================
   LOOP — fixed timestep physics, real-dt visuals
   ========================================================================= */
const FIXED=1/60, MAX_STEPS=5;
let last=0, loopStarted=false, paused=false, acc=0, fpsT=0, fpsN=0, fps=0, fxCheckT=0;
function frame(now){
  requestAnimationFrame(frame);
  if(paused){ last=now; return; }
  let dt=(now-last)/1000; last=now; if(dt>0.25) dt=0.25; if(dt<0) dt=0;
  buttons=[];
  if(scene==='play'){ acc+=dt; let steps=0; while(acc>=FIXED && steps<MAX_STEPS){ update(FIXED); acc-=FIXED; steps++; } if(steps>=MAX_STEPS) acc=0; }
  else { acc=0; if(scene==='over') Result.upd(dt); }
  P.upd(dt); Pop.upd(dt);
  if(shakeT>0){ shakeT-=dt; if(shakeT<=0) shakeMag=0; }
  ctx.clearRect(0,0,W,H);
  ctx.save(); if(shakeMag>0){ const s=shakeMag; ctx.translate(rand(-s,s),rand(-s,s)); }
  if(scene==='home') renderHome(dt);
  else if(scene==='play'){ renderPlay(); P.draw(); }
  else if(scene==='over'){ renderPlay(); P.draw(); Result.render(); }
  else if(scene==='shop') renderShop();
  ctx.restore();
  fpsT+=dt; fpsN++;
  if(fpsT>=1){ fps=Math.round(fpsN/fpsT); fpsT=0; fpsN=0; fxCheckT+=1;
    if(fxCheckT>=2){ if(FX==='high'&&fps<46) FX='medium'; else if(FX==='medium'&&fps<36) FX='low'; } }
  if(DEBUG){ text('fps '+fps+'  fx '+FX+'  p '+P.a.length, 8, H-12, 11, '#5b6488', 600, 0, 'left'); }
}
function startLoop(){ if(loopStarted) return; loopStarted=true; last=performance.now(); requestAnimationFrame(frame); }
document.addEventListener('visibilitychange', ()=>{ paused=document.hidden; if(!paused){ last=performance.now(); acc=0; } });
window.addEventListener('load', ()=>{ resize(); startLoop(); });
resize(); startLoop();
</script>
